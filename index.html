<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            background: #020008;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ============ VIGNETTE ============ */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.75) 85%, #000 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ============ LLUVIA SUTIL ============ */
        .rain-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.25;
        }
        .raindrop {
            position: absolute;
            width: 1px;
            height: 15px;
            background: linear-gradient(180deg, transparent, rgba(180, 150, 255, 0.5));
            animation: rainFall var(--rdur) linear infinite;
            animation-delay: var(--rdelay);
            top: -20px;
        }
        @keyframes rainFall {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(105vh);
                opacity: 0;
            }
        }

        /* ============ ATMÓSFERA ============ */
        .atmosphere {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 35% 25%, rgba(180, 0, 255, 0.16) 0%, transparent 50%),
                radial-gradient(ellipse at 65% 55%, rgba(255, 0, 140, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 70%, rgba(80, 0, 180, 0.1) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        /* ============ PARTÍCULAS 3 CAPAS ============ */
        .particles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .particle-fast,
        .particle-mid,
        .particle-slow {
            position: absolute;
            border-radius: 50%;
            animation: floatUp var(--dur) infinite;
            opacity: 0;
        }
        .particle-fast {
            width: 1px;
            height: 1px;
            background: #ff90d0;
            --dur: 4s;
        }
        .particle-mid {
            width: 2px;
            height: 2px;
            background: #d400ff;
            --dur: 6s;
        }
        .particle-slow {
            width: 3px;
            height: 3px;
            background: #a000d0;
            --dur: 9s;
            box-shadow: 0 0 5px rgba(160, 0, 220, 0.4);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) scale(2.5);
                opacity: 0;
            }
        }

        /* ============ CONTENEDOR PRINCIPAL ============ */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 1.4s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* ============ EFECTO PUERTA DE CLUB ============ */
        .door-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
            background: #000;
            animation: doorOpen 1.8s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            animation-delay: 0.3s;
        }
        @keyframes doorOpen {
            0% {
                clip-path: inset(0 0 0 0);
            }
            60% {
                clip-path: inset(0 0 0 0);
            }
            100% {
                clip-path: inset(0 50% 0 50%);
                opacity: 0;
            }
        }

        /* ============ LOGO CON LUNA ============ */
        .logo-area {
            text-align: center;
            position: relative;
        }
        .logo-emblem {
            position: relative;
            display: inline-block;
            margin-bottom: 4px;
        }
        .logo-text {
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #fff;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            text-shadow: 0 0 30px rgba(212, 0, 255, 0.5), 0 0 60px rgba(255, 0, 140, 0.3);
            animation: neonPulse 3.5s ease-in-out infinite, glitchSkew 6s ease-in-out infinite;
        }
        @keyframes neonPulse {
            0%,
            100% {
                text-shadow: 0 0 30px rgba(212, 0, 255, 0.5), 0 0 60px rgba(255, 0, 140, 0.3);
            }
            50% {
                text-shadow: 0 0 55px rgba(212, 0, 255, 0.85), 0 0 90px rgba(255, 0, 140, 0.55);
            }
        }
        @keyframes glitchSkew {
            0%,
            93%,
            100% {
                transform: skew(0deg);
            }
            95% {
                transform: skew(2.5deg);
            }
            97% {
                transform: skew(-1.5deg);
            }
        }
        .logo-letter {
            display: inline-block;
            opacity: 0;
            animation: letterPop 0.2s ease forwards;
        }
        @keyframes letterPop {
            0% {
                opacity: 0;
                transform: translateY(-8px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .logo-dot {
            color: #d400ff;
            animation: letterPop 0.2s ease forwards;
        }
        /* LUNA - La C es una luna creciente */
        .moon-c {
            display: inline-block;
            width: 42px;
            height: 42px;
            position: relative;
            margin: 0 4px;
            animation: moonGlow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 18px rgba(255, 200, 255, 0.7)) drop-shadow(0 0 35px rgba(212, 0, 255, 0.5));
        }
        @keyframes moonGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 18px rgba(255, 200, 255, 0.7)) drop-shadow(0 0 35px rgba(212, 0, 255, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 28px rgba(255, 220, 255, 0.9)) drop-shadow(0 0 50px rgba(212, 0, 255, 0.7));
            }
        }
        .moon-c::before {
            content: '';
            position: absolute;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 50px rgba(212, 0, 255, 0.5), inset 0 0 20px rgba(200, 200, 255, 0.3);
        }
        .moon-c::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #0a0018;
            top: 2px;
            right: -6px;
        }

        /* ============ MENSAJE OCULTO ============ */
        .hidden-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 12px;
            letter-spacing: 8px;
            color: rgba(212, 0, 255, 0);
            z-index: 60;
            pointer-events: none;
            animation: whisperMessage 5s ease-in-out infinite;
            animation-delay: 4s;
            text-transform: uppercase;
        }
        @keyframes whisperMessage {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(0);
                color: rgba(212, 0, 255, 0);
            }
            15% {
                transform: translate(-50%, -50%) scale(1.2);
                color: rgba(212, 0, 255, 0.5);
            }
            30% {
                transform: translate(-50%, -50%) scale(1);
                color: rgba(212, 0, 255, 0.15);
            }
            45% {
                transform: translate(-50%, -50%) scale(0);
                color: rgba(212, 0, 255, 0);
            }
        }

        /* ============ TEXTO SECUNDARIO ============ */
        .slogan {
            font-size: 15px;
            letter-spacing: 5px;
            color: #d400ff;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: 400;
            text-shadow: 0 0 15px rgba(212, 0, 255, 0.35);
        }
        .tagline {
            font-size: 9px;
            letter-spacing: 3px;
            color: #777;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .access-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 8px;
            letter-spacing: 2px;
            color: #555;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .access-code {
            background: rgba(212, 0, 255, 0.05);
            border: 1px solid rgba(212, 0, 255, 0.18);
            padding: 4px 10px;
            border-radius: 12px;
            color: #d400ff;
            font-size: 9px;
            letter-spacing: 1px;
        }
        .visitor-counter span {
            color: #d400ff;
        }
        .private-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(212, 0, 255, 0.06);
            border: 1px solid rgba(212, 0, 255, 0.18);
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 8px;
            letter-spacing: 2px;
            color: #d400ff;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ============ ECUALIZADOR ============ */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            justify-content: center;
        }
        .eq-bar {
            width: 2px;
            background: linear-gradient(180deg, #d400ff, #ff0070);
            border-radius: 1px;
            animation: eqBounce 0.7s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) {
            height: 6px;
            animation-delay: 0s;
        }
        .eq-bar:nth-child(2) {
            height: 11px;
            animation-delay: 0.07s;
        }
        .eq-bar:nth-child(3) {
            height: 5px;
            animation-delay: 0.14s;
        }
        .eq-bar:nth-child(4) {
            height: 14px;
            animation-delay: 0.21s;
        }
        .eq-bar:nth-child(5) {
            height: 8px;
            animation-delay: 0.28s;
        }
        .eq-bar:nth-child(6) {
            height: 12px;
            animation-delay: 0.35s;
        }
        .eq-bar:nth-child(7) {
            height: 4px;
            animation-delay: 0.42s;
        }
        .eq-bar:nth-child(8) {
            height: 9px;
            animation-delay: 0.49s;
        }
        @keyframes eqBounce {
            0%,
            100% {
                transform: scaleY(1);
            }
            50% {
                transform: scaleY(0.3);
            }
        }

        .divider {
            width: 45px;
            height: 1px;
            background: linear-gradient(90deg, #d400ff, #ff0070, transparent);
            opacity: 0.5;
        }

        /* ============ COOKIES ============ */
        .cookie-banner {
            width: 100%;
            background: rgba(12, 4, 20, 0.9);
            border: 1px solid rgba(212, 0, 255, 0.12);
            border-radius: 5px;
            padding: 9px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 9px;
            color: #888;
            backdrop-filter: blur(6px);
            transition: all 0.4s;
        }
        .cookie-banner.hidden {
            display: none;
        }
        .cookie-btns {
            display: flex;
            gap: 4px;
        }
        .cookie-btn {
            padding: 5px 10px;
            border: 1px solid #444;
            background: none;
            color: #aaa;
            cursor: pointer;
            font-size: 8px;
            border-radius: 14px;
            letter-spacing: 1px;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .cookie-btn:hover {
            border-color: #d400ff;
            color: #d400ff;
        }
        .cookie-btn.accept {
            background: #d400ff;
            border-color: #d400ff;
            color: #fff;
        }

        /* ============ LOGIN PANEL ============ */
        .login-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: all 0.5s ease;
        }
        .login-panel.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        .selectors-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }
        .select-group {
            flex: 1;
            position: relative;
        }
        .select-group select {
            width: 100%;
            padding: 9px 10px;
            background: #08081a;
            border: 1px solid #2a2a3a;
            border-radius: 4px;
            color: #ccc;
            font-size: 10px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .select-group::after {
            content: '▾';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #d400ff;
            font-size: 8px;
            pointer-events: none;
        }
        .input-field {
            width: 100%;
            padding: 12px 14px;
            background: #08081a;
            border: 1px solid #2a2a3a;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #d400ff;
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.08);
        }
        .input-field::placeholder {
            color: #555;
        }
        .btn-enter {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #d400ff, #9000b0);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-enter:hover {
            background: linear-gradient(135deg, #e010ff, #a000c0);
            box-shadow: 0 0 25px rgba(212, 0, 255, 0.3);
            transform: translateY(-1px);
        }
        .error-msg {
            color: #ff4060;
            font-size: 9px;
            text-align: center;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .password-hint {
            color: #555;
            font-size: 8px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* ============ BOLA DE DISCOTECA REALISTA ============ */
        .disco-ball-container {
            position: fixed;
            top: 30px;
            right: 28px;
            z-index: 30;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .disco-ball-container.visible {
            opacity: 1;
        }
        /* Cable */
        .disco-cable {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 45px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(180, 180, 200, 0.2));
            z-index: 31;
        }
        /* Bola */
        .disco-ball {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 38% 32%, #fff 4%, #e8e8e8 12%, #c0c0c0 28%, #808080 48%, #505050 68%, #222 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.6), 0 0 35px rgba(212, 0, 255, 0.3), 0 0 55px rgba(255, 255, 255, 0.08);
            animation: swingDisco 3s ease-in-out infinite, spinDisco 6s linear infinite;
            transform-origin: center center;
        }
        @keyframes swingDisco {
            0%,
            100% {
                transform: rotate(0deg) translateX(0);
            }
            25% {
                transform: rotate(0deg) translateX(2px);
            }
            75% {
                transform: rotate(0deg) translateX(-2px);
            }
        }
        @keyframes spinDisco {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .disco-ball::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(0, 0, 0, 0.18) 4px,
                    rgba(0, 0, 0, 0.18) 5px),
                repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0, 0, 0, 0.18) 4px, rgba(0, 0, 0, 0.18) 5px);
        }
        .disco-ball::after {
            content: '';
            position: absolute;
            top: 8%;
            left: 20%;
            width: 22%;
            height: 22%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.55) 0%, transparent 60%);
            border-radius: 50%;
        }
        .sparkle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: sparkleBurst 0.5s ease-out forwards;
            box-shadow: 0 0 3px #d400ff, 0 0 8px #ff40c0, 0 0 12px #fff;
        }
        @keyframes sparkleBurst {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1);
                opacity: 0;
            }
        }
        .disco-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, rgba(212, 0, 255, 0.25) 30%, transparent 70%);
            border-radius: 50%;
            animation: initialFlash 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes initialFlash {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
            }
        }

        /* ============ FOOTER LEGAL ============ */
        .legal-footer {
            position: fixed;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 8px;
            color: #3a3a3a;
            z-index: 5;
        }
        .legal-footer a {
            color: #3a3a3a;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }
        .legal-footer a:hover {
            color: #d400ff;
        }

        /* ============ ESCRITORIO ============ */
        #desktop-screen {
            display: none;
            min-height: 100vh;
            width: 100%;
            background: #0a6e6e;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        #desktop-screen.active {
            display: block;
        }
        .desktop-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: linear-gradient(135deg, #0a5e5e, #0a7a7a, #0a6e6e);
            z-index: 0;
        }
        .icons-area {
            position: relative;
            z-index: 1;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            width: 90px;
            background: none;
            border: 1px solid transparent;
            color: white;
            font-family: inherit;
            font-size: 11px;
        }
        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
        }
        .desktop-icon .icon-label {
            color: white;
            font-size: 11px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 1000;
            gap: 8px;
        }
        .start-btn {
            background: #d400ff;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            height: 30px;
            font-family: inherit;
        }
        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
        }
        .taskbar-player button {
            background: #d400ff;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }
        .taskbar-time {
            margin-left: auto;
            color: #ccc;
            font-size: 12px;
        }
        .logout-btn {
            background: none;
            border: 1px solid #d400ff;
            color: #d400ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }
        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 8px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            z-index: 1001;
            width: 170px;
        }
        .start-menu.active {
            display: block;
        }
        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
            border: none;
            background: none;
            width: 100%;
            text-align: left;

        @media (max-width: 600px) {
            .logo-text {
                font-size: 36px;
                letter-spacing: 4px;
            }
            .moon-c {
                width: 30px;
                height: 30px;
            }
            .moon-c::before {
                width: 30px;
                height: 30px;
            }
            .moon-c::after {
                width: 22px;

                right: -4px;
            }

            }
            .selectors-row {

                left: 8px;
                gap: 8px;
            }
            .disco-ball {
                width: 28px;
                height: 28px;
            }
            .disco-ball-container {
                top: 20px;
                right: 16px;
            }
            .disco-cable {
                top: -30px;
                height: 35px;
            }
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="atmosphere"></div>

    <!-- EFECTO PUERTA -->

    <!-- MENSAJE OCULTO -->

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="main-container" id="main-container">
            <div class="logo-area">
                <div class="logo-text" id="logo-text"></div>
                <div class="slogan" id="slogan-text">Chaos With Purpose</div>
                <div class="tagline" id="tagline-text">Designed in Málaga to the world</div>
                <div class="access-info">

            </div>

            <div class="equalizer">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div>
            </div>

            <div class="divider"></div>

            <div class="cookie-banner" id="cookie-banner">

                <div class="cookie-btns">

            <div class="login-panel" id="login-panel">

                    <div class="select-group">
                        <select id="lang-select" onchange="updateTranslations()">
                            <option value="ES">🌐 Español</option><option value="EN">🌐 English</option>
                            <option value="IT">🌐 Italiano</option><option value="FR">🌐 Français</option>

    <!-- DESKTOP -->
    <div id="desktop-screen">

            <button class="desktop-icon" ondblclick="openWindow('store')"><div class="icon-img">💿</div><span class="icon-label">Store</span></button>
            <button class="desktop-icon" ondblclick="openWindow('merch')"><div class="icon-img">👕</div><span class="icon-label">Merch</span></button>
            <button class="desktop-icon" ondblclick="openWindow('tours')"><div class="icon-img">🌍</div><span class="icon-label">Tours</span></button>
            <button class="desktop-icon" ondblclick="openWindow('babybuus')"><div class="icon-img">👶</div><span class="icon-label">Baby Buu's</span></button>
            <button class="desktop-icon" ondblclick="openWindow('artists')"><div class="icon-img">🎨</div><span class="icon-label">Artists</span></button>
        </div>
        <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
            <div class="window-box" onclick="event.stopPropagation()">
                <div class="window-titlebar"><span id="window-title"></span><button class="window-close" onclick="closeWindowDirect()">✕</button></div>
                <div class="window-body" id="window-body"></div>
            </div>
        </div>
        <div class="start-menu" id="start-menu">
            <div class="start-menu-item" onclick="openWindow('myc');toggleStart()">🎤 M.Y.C</div>
            <div class="start-menu-item" onclick="openWindow('store');toggleStart()">💿 Store</div>
            <div class="start-menu-item" onclick="openWindow('merch');toggleStart()">👕 Merch</div>
            <div class="start-menu-item" onclick="openWindow('tours');toggleStart()">🌍 Tours</div>
            <div class="start-menu-item" onclick="openWindow('babybuus');toggleStart()">👶 Baby Buu's</div>
            <div class="start-menu-item" onclick="openWindow('artists');toggleStart()">🎨 Artists</div>
            <div style="border-top:1px solid #333;margin:4px 0;"></div>
            <div class="start-menu-item" onclick="logout()">🚪 Cerrar sesión</div>
        </div>
        <div class="taskbar">
            <button class="start-btn" onclick="toggleStart()">🏠 Inicio</button>
            <div class="taskbar-player"><span>🎵 SYNTH</span><button id="play-btn" onclick="togglePlay()">▶</button></div>
            <button class="logout-btn" onclick="logout()">Salir</button>
            <div class="taskbar-time" id="taskbar-time"></div>
        </div>
    </div>

    <script>
        // ============ LLUVIA ============
        var rl = document.getElementById('rain-layer');
        for (var i = 0; i < 50; i++) {
            var rd = document.createElement('div');
            rd.className = 'raindrop';
            rd.style.left = Math.random() * 100 + '%';
            rd.style.setProperty('--rdur', (1.5 + Math.random() * 3) + 's');
            rd.style.setProperty('--rdelay', Math.random() * 3 + 's');
            rl.appendChild(rd);
        }

        // ============ PARTÍCULAS ============
        var pl = document.getElementById('particles-layer');
        for (var j = 0; j < 18; j++) {
            ['particle-fast', 'particle-mid', 'particle-slow'].forEach(function(c) {
                var p = document.createElement('div');
                p.className = c;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 9 + 's';
                pl.appendChild(p);
            });
        }

        // ============ SECUENCIA DE ENTRADA ============
        (function entrance() {
            var logoEl = document.getElementById('logo-text');
            var elements = [
                { type: 'letter', char: 'M' },
                { type: 'dot', char: '.' },
                { type: 'letter', char: 'Y' },
                { type: 'dot', char: '.' },
                { type: 'moon', char: '' }
            ];
            logoEl.innerHTML = '';
            elements.forEach(function(el, i) {
                if (el.type === 'moon') {
                    var moon = document.createElement('span');
                    moon.className = 'moon-c logo-letter';
                    moon.style.animationDelay = (i * 0.12) + 's';
                    logoEl.appendChild(moon);
                } else {
                    var span = document.createElement('span');
                    span.className = 'logo-letter';
                    if (el.type === 'dot') span.classList.add('logo-dot');
                    span.textContent = el.char;
                    span.style.animationDelay = (i * 0.12) + 's';
                    logoEl.appendChild(span);
                }
            });

            setTimeout(function() {
                document.getElementById('main-container').classList.add('visible');
            }, 900);

            setTimeout(function() {
                document.getElementById('disco-ball-container').classList.add('visible');
                var f = document.getElementById('disco-flash');
                if (f) f.style.display = 'block';
                setTimeout(function() { if (f) f.style.display = 'none'; }, 500);
            }, 1600);

            setTimeout(function() {
                var door = document.getElementById('door-effect');
                if (door) door.style.opacity = '0';
            }, 2100);
        })();

        // ============ DESTELLOS ============
        var db = document.getElementById('disco-ball-container');
        setInterval(function() {
            var s = document.createElement('div');
            s.className = 'sparkle';
            var a = Math.random() * 360;
            var d = 14 + Math.random() * 24;
            s.style.setProperty('--dx', Math.cos(a * Math.PI / 180) * d + 'px');
            s.style.setProperty('--dy', Math.sin(a * Math.PI / 180) * d + 'px');
            s.style.left = '19px';
            s.style.top = '19px';
            db.appendChild(s);
            setTimeout(function() { s.remove(); }, 500);
        }, 2000);

        // ============ CÓDIGO + CONTADOR ============
        document.getElementById('access-code').textContent = '#MYC-' + Math.floor(Math.random() * 9000 + 1000);
        document.getElementById('visitor-num').textContent = String(Math.floor(Math.random() * 9000 + 1000)).padStart(4,
        '0');

        // ============ TRADUCCIONES ============
        var t = {
            'ES': { slogan: 'Chaos With Purpose', tagline: 'Diseñado en Málaga para el mundo', badge: '🔒 Acceso Privado',
                cookie: '🍪 Usamos cookies.', reject: 'Rechazar', accept: 'Aceptar', email: 'Email o teléfono',
                pass: 'Contraseña', hint: '🔑 Pista: La fecha más importante', enter: 'Entrar', terms: 'Términos',
                privacy: 'Privacidad', help: 'Ayuda', errEmpty: 'Ingresa tu email o teléfono',
                errPass: 'Contraseña incorrecta' },
            'EN': { slogan: 'Chaos With Purpose', tagline: 'Designed in Málaga to the world', badge: '🔒 Private Access',
                cookie: '🍪 We use cookies.', reject: 'Reject', accept: 'Accept', email: 'Email or phone',
                pass: 'Password', hint: '🔑 Hint: Most important date', enter: 'Enter', terms: 'Terms',
                privacy: 'Privacy', help: 'Help', errEmpty: 'Enter your email', errPass: 'Incorrect password' },
            'IT': { slogan: 'Chaos With Purpose', tagline: 'Progettato a Málaga', badge: '🔒 Accesso Privato',
                cookie: '🍪 Usiamo i cookie.', reject: 'Rifiutare', accept: 'Accettare', email: 'Email o telefono',
                pass: 'Password', hint: '🔑 Suggerimento', enter: 'Entrare', terms: 'Termini', privacy: 'Privacy',
                help: 'Aiuto', errEmpty: 'Inserisci email', errPass: 'Password errata' },
            'FR': { slogan: 'Chaos With Purpose', tagline: 'Conçu à Málaga', badge: '🔒 Accès Privé',
                cookie: '🍪 Nous utilisons des cookies.', reject: 'Refuser', accept: 'Accepter',
                email: 'Email ou téléphone', pass: 'Mot de passe', hint: '🔑 Indice', enter: 'Entrer', terms: 'Termes',
                privacy: 'Confidentialité', help: 'Aide', errEmpty: 'Entrez votre email',
            errPass: 'Mot de passe incorrect' },
            'DE': { slogan: 'Chaos With Purpose', tagline: 'Entworfen in Málaga', badge: '🔒 Privater Zugang',
                cookie: '🍪 Wir verwenden Cookies.', reject: 'Ablehnen', accept: 'Akzeptieren',
                email: 'Email oder Telefon', pass: 'Passwort', hint: '🔑 Hinweis', enter: 'Einloggen', terms: 'AGB',
                privacy: 'Datenschutz', help: 'Hilfe', errEmpty: 'Email eingeben', errPass: 'Falsches Passwort' },
            'POR': { slogan: 'Chaos With Purpose', tagline: 'Desenhado em Málaga', badge: '🔒 Acesso Privado',
                cookie: '🍪 Usamos cookies.', reject: 'Rejeitar', accept: 'Aceitar', email: 'Email ou telefone',
                pass: 'Senha', hint: '🔑 Dica', enter: 'Entrar', terms: 'Termos', privacy: 'Privacidade',
                help: 'Ajuda', errEmpty: 'Insira seu email', errPass: 'Senha incorreta' }
        };

        function updateTranslations() {
            var l = document.getElementById('lang-select').value;
            var d = t[l] || t['ES'];
            var ids = ['slogan-text', 'tagline-text', 'private-badge', 'cookie-text', 'cookie-reject', 'cookie-accept',
                'password-hint', 'btn-enter', 'legal-terms', 'legal-privacy', 'legal-help'
            ];
            var keys = ['slogan', 'tagline', 'badge', 'cookie', 'reject', 'accept', 'hint', 'enter', 'terms', 'privacy',
                'help'
            ];
            ids.forEach(function(id, i) { var el = document.getElementById(id); if (el) el.textContent = d[keys[i]]; });
            document.getElementById('email-input').placeholder = d.email;
            document.getElementById('password-input').placeholder = d.pass;
            window._t = d;
        }

        function acceptCookies() { document.getElementById('cookie-banner').classList.add('hidden');
            document.getElementById('login-panel').classList.add('visible'); }

        function rejectCookies() { document.getElementById('cookie-banner').classList.add('hidden');
            document.getElementById('login-panel').classList.add('visible'); }

        function login() {
            var d = window._t || t['ES'];
            var e = document.getElementById('email-input').value.trim();
            var p = document.getElementById('password-input').value.trim();
            var err = document.getElementById('error-msg');
            if (!e) { err.textContent = d.errEmpty;
                err.classList.add('show'); return; }
            if (p === '23/10/2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('desktop-screen').classList.add('active');
                updateClock();
                setInterval(updateClock, 1000);
            } else { err.textContent = d.errPass;
                err.classList.add('show'); }
        }
        document.getElementById('password-input').addEventListener('keypress', function(e) { if (e.key === 'Enter')
            login(); });

        function logout() {
            document.getElementById('desktop-screen').classList.remove('active');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('password-input').value = '';
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('cookie-banner').classList.remove('hidden');
            document.getElementById('login-panel').classList.remove('visible');
        }

        function updateClock() { var d = new Date(); var el = document.getElementById('taskbar-time'); if (el) el
                .textContent = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }); }

        function toggleStart() { document.getElementById('start-menu').classList.toggle('active'); }
        document.addEventListener('click', function(e) { var m = document.getElementById('start-menu'); var b = document
                .querySelector('.start-btn'); if (m && !m.contains(e.target) && e.target !== b && !b.contains(e.target))
                m.classList.remove('active'); });

        var contents = {
            'myc': { title: 'M.Y.C', body: '<h3>M.Y.C</h3><p>Sello independiente. Chaos With Purpose.</p>' },
            'store': { title: 'STORE',
                body: '<h3>STORE</h3><div class="mini-grid"><div class="mini-card">💿 Neon Void Vol.1</div></div>' },
            'merch': { title: 'MERCH',
                body: '<h3>MERCH</h3><div class="mini-grid"><div class="mini-card">👕 Camiseta</div></div>' },
            'tours': { title: 'TOURS',
            body: '<h3>TOURS</h3><div class="tour-line"><span class="tour-date">15 DIC</span>Tokyo</div>' },
            'babybuus': { title: 'BABY BUUS', body: '<h3>BABY BUUS</h3><p>Subsello experimental.</p>' },
            'artists': { title: 'ARTISTS',
                body: '<h3>ARTISTS</h3><div class="mini-grid"><div class="mini-card">🎹 VHS GLITCH</div></div>' }
        };

        function openWindow(p) { var o = document.getElementById('window-overlay'); var tb = document.getElementById(
                'window-title'); var bb = document.getElementById('window-body'); if (contents[p]) { tb.textContent =
                contents[p].title;
                bb.innerHTML = contents[p].body;
                o.classList.add('active'); } }

        function closeWindowDirect() { document.getElementById('window-overlay').classList.remove('active'); }

        function closeWindow(e) { if (e.target === document.getElementById('window-overlay')) document.getElementById(
                'window-overlay').classList.remove('active'); }

        var ctx = null,
            playing = false,
            osc = null,
            gain = null;

        function initAudio() { if (!ctx) { ctx = new(window.AudioContext || window.webkitAudioContext)();
                osc = ctx.createOscillator();
                gain = ctx.createGain(); var f = ctx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, ctx.currentTime);
                f.type = 'lowpass';
                f.frequency.setValueAtTime(600, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                osc.connect(f);
                f.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setInterval(function() { if (playing && osc) osc.frequency.setValueAtTime(110 + Math.sin(Date.now() *
                        0.001) * 5, ctx.currentTime); }, 100); } }

        function togglePlay() { var btn = document.getElementById('play-btn');
            initAudio(); if (ctx.state === 'suspended') ctx.resume(); if (playing) { gain.gain.setValueAtTime(0, ctx
                    .currentTime);
                btn.textContent = '▶';
                playing = false; } else { gain.gain.setValueAtTime(0.15, ctx.currentTime);
                btn.textContent = '⏸';
                playing = true; } }
    </script>
