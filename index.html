<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — Access Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            padding: 20px;
        }

        /* Contenedor principal */
        .main-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }

        /* Logo */
        .logo-area {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #ffffff;
            line-height: 1;
        }

        .logo-dot {
            color: #d400ff;
        }

        .logo-sub {
            font-size: 11px;
            letter-spacing: 6px;
            color: #777;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Cookies */
        .cookie-banner {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: #aaa;
            transition: all 0.4s;
        }

        .cookie-banner.hidden {
            display: none;
        }

        .cookie-btns {
            display: flex;
            gap: 8px;
        }

        .cookie-btn {
            padding: 8px 16px;
            border: 1px solid #444;
            background: none;
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .cookie-btn:hover {
            border-color: #d400ff;
            color: #d400ff;
        }

        .cookie-btn.accept {
            background: #d400ff;
            border-color: #d400ff;
            color: #fff;
        }

        /* Panel login (oculto hasta aceptar cookies) */
        .login-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .login-panel.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        /* Campos */
        .input-field {
            width: 100%;
            padding: 15px 16px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: #d400ff;
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.15);
        }

        .input-field::placeholder {
            color: #555;
        }

        .btn-enter {
            width: 100%;
            padding: 15px;
            background: #d400ff;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-enter:hover {
            background: #b800e0;
            box-shadow: 0 0 30px rgba(212, 0, 255, 0.3);
        }

        .error-msg {
            color: #ff4060;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Selectores región e idioma */
        .selectors-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .select-group {
            flex: 1;
            position: relative;
        }

        .select-group select {
            width: 100%;
            padding: 12px 14px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .select-group::after {
            content: '▼';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            font-size: 10px;
            pointer-events: none;
        }

        .select-group select:focus {
            border-color: #d400ff;
        }

        /* Footer legal */
        .legal-footer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #555;
            z-index: 5;
        }

        .legal-footer a {
            color: #555;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .legal-footer a:hover {
            color: #d400ff;
        }

        /* Fondo atmósfera sutil */
        .bg-atmo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 40%, rgba(100, 0, 150, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Escritorio */
        #desktop-screen {
            display: none;
            min-height: 100vh;
            width: 100%;
            background: #0a6e6e;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        #desktop-screen.active {
            display: block;
        }

        .desktop-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: linear-gradient(135deg, #0a5e5e, #0a7a7a, #0a6e6e);
            z-index: 0;
        }

        .icons-area {
            position: relative;
            z-index: 1;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            width: 90px;
            background: none;
            border: 1px solid transparent;
            color: white;
            font-family: inherit;
            font-size: 11px;
            transition: background 0.15s;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            pointer-events: none;
        }
        .desktop-icon .icon-label {
            color: white;
            font-size: 11px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            text-align: center;
            pointer-events: none;
            line-height: 1.3;
        }

        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 1000;
            gap: 8px;
        }
        .start-btn {
            background: #d400ff;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            height: 30px;
            font-family: inherit;
        }
        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
        }
        .taskbar-player button {
            background: #d400ff;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }
        .taskbar-time {
            margin-left: auto;
            color: #ccc;
            font-size: 12px;
        }
        .logout-btn {
            background: none;
            border: 1px solid #d400ff;
            color: #d400ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }

        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 8px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            z-index: 1001;
            width: 170px;
            overflow: hidden;
        }
        .start-menu.active {
            display: block;
        }
        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .start-menu-item:hover {
            background: #d400ff;
            color: white;
        }

        .window-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .window-overlay.active {
            display: flex;
        }
        .window-box {
            background: #1a1a2e;
            border: 1px solid #d400ff;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 65vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }
        .window-titlebar {
            background: #0d0d1a;
            color: #d400ff;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            border-bottom: 1px solid #d400ff;
        }
        .window-close {
            background: none;
            border: none;
            color: #d400ff;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            font-family: inherit;
        }
        .window-body {
            padding: 16px;
            overflow-y: auto;
            color: #ccc;
            font-size: 13px;
            line-height: 1.7;
        }
        .window-body h3 {
            color: #d400ff;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .mini-card {
            background: #0d0d1a;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
        }
        .mini-card:hover {
            border-color: #d400ff;
        }
        .mini-card .icon {
            font-size: 30px;
            margin-bottom: 6px;
        }
        .tour-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3e;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tour-date {
            color: #d400ff;
            font-weight: bold;
            min-width: 60px;
        }
        .btn-sm {
            background: #d400ff;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }

        @media (max-width: 600px) {
            .logo-text {
                font-size: 36px;
                letter-spacing: 4px;
            }
            .selectors-row {
                flex-direction: column;
            }
            .legal-footer {
                bottom: 10px;
                left: 10px;
                gap: 12px;
                font-size: 10px;
            }
            .icons-area {
                justify-content: center;
            }
            .mini-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="bg-atmo"></div>

    <!-- ============ LOGIN ============ -->
    <div id="login-screen">
        <div class="main-container">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-text">M<span class="logo-dot">.</span>Y<span class="logo-dot">.</span>C</div>
                <div class="logo-sub">The Mayin Buu Club</div>
            </div>

            <!-- Cookies -->
            <div class="cookie-banner" id="cookie-banner">
                <span>🍪 Usamos cookies propias y de terceros para mejorar tu experiencia.</span>
                <div class="cookie-btns">
                    <button class="cookie-btn" onclick="rejectCookies()">Rechazar</button>
                    <button class="cookie-btn accept" onclick="acceptCookies()">Aceptar todo</button>
                </div>
            </div>

            <!-- Panel login (aparece tras cookies) -->
            <div class="login-panel" id="login-panel">
                <!-- Región + Idioma -->
                <div class="selectors-row">
                    <div class="select-group">
                        <select id="region-select">
                            <option value="ES">🌍 España</option>
                            <option value="IT">🌍 Italia</option>
                            <option value="FR">🌍 France</option>
                            <option value="EN">🌍 English</option>
                            <option value="DE">🌍 Deutschland</option>
                            <option value="POR">🌍 Portugal</option>
                        </select>
                    </div>
                    <div class="select-group">
                        <select id="lang-select">
                            <option value="ES">🌐 Español</option>
                            <option value="IT">🌐 Italiano</option>
                            <option value="FR">🌐 Français</option>
                            <option value="EN">🌐 English</option>
                            <option value="DE">🌐 Deutsch</option>
                            <option value="POR">🌐 Português</option>
                        </select>
                    </div>
                </div>

                <input type="text" class="input-field" id="email-input" placeholder="Email o número de teléfono">
                <input type="password" class="input-field" id="password-input" placeholder="Contraseña">

                <div class="error-msg" id="error-msg"></div>

                <button class="btn-enter" onclick="login()">Entrar</button>
            </div>
        </div>

        <!-- Footer legal -->
        <div class="legal-footer">
            <a>Términos y condiciones</a>
            <a>Privacidad</a>
            <a>Ayuda</a>
            <a>Accesibilidad</a>
        </div>
    </div>

    <!-- ============ ESCRITORIO ============ -->
    <div id="desktop-screen">
        <div class="desktop-bg"></div>
        <div class="icons-area">
            <button class="desktop-icon" ondblclick="openWindow('myc')"><div class="icon-img">🎤</div><span class="icon-label">M.Y.C</span></button>
            <button class="desktop-icon" ondblclick="openWindow('store')"><div class="icon-img">💿</div><span class="icon-label">Store</span></button>
            <button class="desktop-icon" ondblclick="openWindow('merch')"><div class="icon-img">👕</div><span class="icon-label">Merch</span></button>
            <button class="desktop-icon" ondblclick="openWindow('tours')"><div class="icon-img">🌍</div><span class="icon-label">Tours</span></button>
            <button class="desktop-icon" ondblclick="openWindow('babybuus')"><div class="icon-img">👶</div><span class="icon-label">Baby Buu's</span></button>
            <button class="desktop-icon" ondblclick="openWindow('artists')"><div class="icon-img">🎨</div><span class="icon-label">Artists</span></button>
        </div>

        <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
            <div class="window-box" onclick="event.stopPropagation()">
                <div class="window-titlebar"><span id="window-title">Ventana</span><button class="window-close" onclick="closeWindowDirect()">✕</button></div>
                <div class="window-body" id="window-body"></div>
            </div>
        </div>

        <div class="start-menu" id="start-menu">
            <div class="start-menu-item" onclick="openWindow('myc');toggleStart()">🎤 M.Y.C</div>
            <div class="start-menu-item" onclick="openWindow('store');toggleStart()">💿 Store</div>
            <div class="start-menu-item" onclick="openWindow('merch');toggleStart()">👕 Merch</div>
            <div class="start-menu-item" onclick="openWindow('tours');toggleStart()">🌍 Tours</div>
            <div class="start-menu-item" onclick="openWindow('babybuus');toggleStart()">👶 Baby Buu's</div>
            <div class="start-menu-item" onclick="openWindow('artists');toggleStart()">🎨 Artists</div>
            <div style="border-top:1px solid #333;margin:4px 0;"></div>
            <div class="start-menu-item" onclick="logout()">🚪 Cerrar sesión</div>
        </div>

        <div class="taskbar">
            <button class="start-btn" onclick="toggleStart()">🏠 Inicio</button>
            <div class="taskbar-player"><span>🎵 SYNTH</span><button id="play-btn" onclick="togglePlay()">▶</button></div>
            <button class="logout-btn" onclick="logout()">Salir</button>
            <div class="taskbar-time" id="taskbar-time"></div>
        </div>
    </div>

    <script>
        // ============ COOKIES ============
        function acceptCookies() {
            document.getElementById('cookie-banner').classList.add('hidden');
            document.getElementById('login-panel').classList.add('visible');
        }

        function rejectCookies() {
            document.getElementById('cookie-banner').classList.add('hidden');
            document.getElementById('login-panel').classList.add('visible');
        }

        // ============ LOGIN ============
        function login() {
            var email = document.getElementById('email-input').value.trim();
            var password = document.getElementById('password-input').value.trim();
            var error = document.getElementById('error-msg');

            if (!email) {
                error.textContent = 'Ingresa tu email o teléfono';
                error.classList.add('show');
                return;
            }
            if (password === '23/10/2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('desktop-screen').classList.add('active');
                updateClock();
                setInterval(updateClock, 1000);
            } else {
                error.textContent = 'Contraseña incorrecta';
                error.classList.add('show');
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        function logout() {
            document.getElementById('desktop-screen').classList.remove('active');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('password-input').value = '';
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('cookie-banner').classList.remove('hidden');
            document.getElementById('login-panel').classList.remove('visible');
        }

        // ============ RELOJ ============
        function updateClock() {
            var d = new Date();
            var el = document.getElementById('taskbar-time');
            if (el) el.textContent = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        // ============ MENÚ INICIO ============
        function toggleStart() {
            document.getElementById('start-menu').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            var m = document.getElementById('start-menu');
            var b = document.querySelector('.start-btn');
            if (m && !m.contains(e.target) && e.target !== b && !b.contains(e.target)) {
                m.classList.remove('active');
            }
        });

        // ============ VENTANAS ============
        var contents = {
            'myc': { title: 'M.Y.C — Info',
                body: '<h3>M.Y.C</h3><p>Sello independiente fundado en 2024.</p><div class="mini-grid"><div class="mini-card"><div class="icon">🎹</div><b>Produccion</b><small>Estudio analogico</small></div><div class="mini-card"><div class="icon">🎛️</div><b>Mastering</b><small>Mezcla profesional</small></div></div>' },
            'store': { title: 'STORE',
                body: '<h3>STORE</h3><div class="mini-grid"><div class="mini-card"><div class="icon">💿</div><b>Neon Void Vol.1</b><small>24.99</small></div><div class="mini-card"><div class="icon">📀</div><b>First Steps EP</b><small>12.99</small></div></div>' },
            'merch': { title: 'MERCH',
                body: '<h3>MERCH</h3><div class="mini-grid"><div class="mini-card"><div class="icon">👕</div><b>Camiseta</b><small>29.99</small></div><div class="mini-card"><div class="icon">🧢</div><b>Gorra</b><small>22.00</small></div></div>' },
            'tours': { title: 'TOURS',
                body: '<h3>TOURS</h3><div class="tour-line"><span class="tour-date">15 DIC</span><span>Tokyo</span><button class="btn-sm">Tickets</button></div><div class="tour-line"><span class="tour-date">20 ENE</span><span>Berlin</span><button class="btn-sm">Tickets</button></div>' },
            'babybuus': { title: 'BABY BUUS',
                body: '<h3>BABY BUUS</h3><p>Subsello experimental.</p><div class="mini-grid"><div class="mini-card"><div class="icon">🍼</div><b>Baby Buu</b><small>Artista</small></div></div>' },
            'artists': { title: 'ARTISTS',
                body: '<h3>ARTISTS</h3><div class="mini-grid"><div class="mini-card"><div class="icon">🎹</div><b>VHS GLITCH</b><small>Synthwave</small></div><div class="mini-card"><div class="icon">🎛️</div><b>TERMINAL X</b><small>Cyberpunk</small></div></div>' }
        };

        function openWindow(page) {
            var o = document.getElementById('window-overlay');
            var t = document.getElementById('window-title');
            var b = document.getElementById('window-body');
            if (contents[page]) { t.textContent = contents[page].title;
                b.innerHTML = contents[page].body;
                o.classList.add('active'); }
        }

        function closeWindowDirect() { document.getElementById('window-overlay').classList.remove('active'); }

        function closeWindow(e) { if (e.target === document.getElementById('window-overlay')) document.getElementById(
                'window-overlay').classList.remove('active'); }

        // ============ REPRODUCTOR ============
        var ctx = null,
            playing = false,
            osc = null,
            gain = null;

        function initAudio() {
            if (!ctx) {
                ctx = new(window.AudioContext || window.webkitAudioContext)();
                osc = ctx.createOscillator();
                gain = ctx.createGain();
                var f = ctx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, ctx.currentTime);
                f.type = 'lowpass';
                f.frequency.setValueAtTime(600, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                osc.connect(f);
                f.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setInterval(function() { if (playing && osc) osc.frequency.setValueAtTime(110 + Math.sin(Date.now() *
                        0.001) * 5, ctx.currentTime); }, 100);
            }
        }

        function togglePlay() {
            var btn = document.getElementById('play-btn');
            initAudio();
            if (ctx.state === 'suspended') ctx.resume();
            if (playing) { gain.gain.setValueAtTime(0, ctx.currentTime);
                btn.textContent = '▶';
                playing = false; } else { gain.gain.setValueAtTime(0.15, ctx.currentTime);
                btn.textContent = '⏸';
                playing = true; }
        }
