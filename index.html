<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a6e6e;
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO ESCRITORIO */
        .desktop-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 42px;
            background: linear-gradient(135deg, #0a5e5e, #0a7a7a, #0a6e6e);
            z-index: 0;
        }

        /* ICONOS */
        .icons-area {
            position: relative;
            z-index: 1;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            width: 90px;
            background: none;
            border: 1px solid transparent;
            color: white;
            font-family: inherit;
            font-size: 11px;
            transition: background 0.15s;
        }

        .desktop-icon:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }

        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            pointer-events: none;
        }

        .desktop-icon .icon-label {
            color: white;
            font-size: 11px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            text-align: center;
            pointer-events: none;
            line-height: 1.3;
        }

        /* BARRA DE TAREAS */
        .taskbar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 42px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 1000;
            gap: 8px;
        }

        .start-btn {
            background: #d400ff;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            height: 30px;
            font-family: inherit;
        }

        .start-btn:hover {
            background: #b000d0;
        }

        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
        }

        .taskbar-player button {
            background: #d400ff;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }

        .taskbar-player button:hover {
            background: #b000d0;
        }

        .taskbar-time {
            margin-left: auto;
            color: #ccc;
            font-size: 12px;
        }

        /* MENU INICIO */
        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 8px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            z-index: 1001;
            width: 170px;
            overflow: hidden;
        }

        .start-menu.active {
            display: block;
        }

        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .start-menu-item:hover {
            background: #d400ff;
            color: white;
        }

        /* VENTANAS */
        .window-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 42px;
            background: rgba(0,0,0,0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .window-overlay.active {
            display: flex;
        }

        .window-box {
            background: #1a1a2e;
            border: 1px solid #d400ff;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 65vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .window-titlebar {
            background: #0d0d1a;
            color: #d400ff;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            border-bottom: 1px solid #d400ff;
        }

        .window-close {
            background: none;
            border: none;
            color: #d400ff;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            font-family: inherit;
        }

        .window-close:hover {
            color: #ff40ff;
        }

        .window-body {
            padding: 16px;
            overflow-y: auto;
            color: #ccc;
            font-size: 13px;
            line-height: 1.7;
        }

        .window-body h3 {
            color: #d400ff;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .window-body p {
            margin-bottom: 10px;
        }

        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .mini-card {
            background: #0d0d1a;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .mini-card:hover {
            border-color: #d400ff;
        }

        .mini-card .icon {
            font-size: 30px;
            margin-bottom: 6px;
        }

        .mini-card b {
            color: white;
            display: block;
            margin-bottom: 2px;
        }

        .mini-card small {
            color: #999;
        }

        .tour-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3e;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tour-date {
            color: #d400ff;
            font-weight: bold;
            min-width: 60px;
        }

        .btn-sm {
            background: #d400ff;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }

        .btn-sm:hover {
            background: #b000d0;
        }

        @media (max-width: 600px) {
            .icons-area {
                justify-content: center;
                gap: 10px;
            }
            .mini-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="desktop-bg" onclick="deselectAll()"></div>

    <div class="icons-area">
        <button class="desktop-icon" ondblclick="openWindow('myc')">
            <div class="icon-img">🎤</div>
            <span class="icon-label">M.Y.C</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('store')">
            <div class="icon-img">💿</div>
            <span class="icon-label">Store</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('merch')">
            <div class="icon-img">👕</div>
            <span class="icon-label">Merch</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('tours')">
            <div class="icon-img">🌍</div>
            <span class="icon-label">Tours</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('babybuus')">
            <div class="icon-img">👶</div>
            <span class="icon-label">Baby Buu's</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('artists')">
            <div class="icon-img">🎨</div>
            <span class="icon-label">Artists</span>
        </button>
    </div>

    <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
        <div class="window-box" onclick="event.stopPropagation()">
            <div class="window-titlebar">
                <span id="window-title">Ventana</span>
                <button class="window-close" onclick="closeWindowDirect()">✕</button>
            </div>
            <div class="window-body" id="window-body"></div>
        </div>
    </div>

    <div class="start-menu" id="start-menu">
        <div class="start-menu-item" onclick="openWindow('myc');toggleStart()">🎤 M.Y.C</div>
        <div class="start-menu-item" onclick="openWindow('store');toggleStart()">💿 Store</div>
        <div class="start-menu-item" onclick="openWindow('merch');toggleStart()">👕 Merch</div>
        <div class="start-menu-item" onclick="openWindow('tours');toggleStart()">🌍 Tours</div>
        <div class="start-menu-item" onclick="openWindow('babybuus');toggleStart()">👶 Baby Buu's</div>
        <div class="start-menu-item" onclick="openWindow('artists');toggleStart()">🎨 Artists</div>
    </div>

    <div class="taskbar">
        <button class="start-btn" onclick="toggleStart()">🏠 Inicio</button>
        <div class="taskbar-player">
            <span>🎵 SYNTH</span>
            <button id="play-btn" onclick="togglePlay()">▶</button>
        </div>
        <div class="taskbar-time" id="taskbar-time"></div>
    </div>

    <script>
        function updateClock() {
            var d = new Date();
            document.getElementById('taskbar-time').textContent = d.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
        }
        updateClock();
        setInterval(updateClock, 1000);

        function deselectAll() {}

        function toggleStart() {
            document.getElementById('start-menu').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            var m = document.getElementById('start-menu');
            var b = document.querySelector('.start-btn');
            if (!m.contains(e.target) && e.target !== b && !b.contains(e.target)) {
                m.classList.remove('active');
            }
        });

        var contents = {
            'myc': {
                title: 'M.Y.C — The Mayin Buu Club',
                body: '<h3>M.Y.C</h3><p>Fundado en 2024. Sello independiente de musica electronica de vanguardia.</p><p>Synthwave, techno experimental y mas.</p><div class="mini-grid"><div class="mini-card"><div class="icon">🎹</div><b>Produccion</b><small>Estudio analogico y digital</small></div><div class="mini-card"><div class="icon">🎛️</div><b>Mastering</b><small>Mezcla profesional</small></div></div>'
            },
            'store': {
                title: 'STORE — Discos',
                body: '<h3>STORE</h3><div class="mini-grid"><div class="mini-card"><div class="icon">💿</div><b>Neon Void Vol.1</b><small>24.99 - Vinilo</small></div><div class="mini-card"><div class="icon">📀</div><b>First Steps EP</b><small>12.99 - Digital</small></div><div class="mini-card"><div class="icon">💾</div><b>Club Edits 001</b><small>18.00 - Cassette</small></div><div class="mini-card"><div class="icon">🎵</div><b>Synth Series 1-3</b><small>34.99 - Box Set</small></div></div>'
            },
            'merch': {
                title: 'MERCH — Ropa',
                body: '<h3>MERCH</h3><div class="mini-grid"><div class="mini-card"><div class="icon">👕</div><b>Camiseta M.Y.C</b><small>29.99</small></div><div class="mini-card"><div class="icon">🧢</div><b>Gorra Baby Buu</b><small>22.00</small></div><div class="mini-card"><div class="icon">🎒</div><b>Tote Bag</b><small>15.99</small></div><div class="mini-card"><div class="icon">📿</div><b>Colgante Limitado</b><small>45.00</small></div></div>'
            },
            'tours': {
                title: 'TOURS — Fechas',
                body: '<h3>TOURS</h3><div class="tour-line"><span class="tour-date">15 DIC</span><span>Tokyo - Cyberdome</span><button class="btn-sm">Tickets</button></div><div class="tour-line"><span class="tour-date">20 ENE</span><span>Berlin - Kraftwerk</span><button class="btn-sm">Tickets</button></div><div class="tour-line"><span class="tour-date">14 FEB</span><span>Miami - Vice Club</span><button class="btn-sm">Tickets</button></div><div class="tour-line"><span class="tour-date">08 MAR</span><span>London - Electric</span><button class="btn-sm">Tickets</button></div>'
            },
            'babybuus': {
                title: 'BABY BUUS — Subsello',
                body: '<h3>BABY BUUS</h3><p>Subsello de M.Y.C enfocado en sonidos experimentales y ludicos.</p><div class="mini-grid"><div class="mini-card"><div class="icon">🍼</div><b>Baby Buu</b><small>Artista principal</small></div><div class="mini-card"><div class="icon">🧸</div><b>First Steps EP</b><small>Vinilo 12" limitado</small></div></div>'
            },
            'artists': {
                title: 'ARTISTS — Roster',
                body: '<h3>ARTISTS</h3><div class="mini-grid"><div class="mini-card"><div class="icon">🎹</div><b>VHS GLITCH</b><small>Synthwave</small></div><div class="mini-card"><div class="icon">🎛️</div><b>TERMINAL X</b><small>Cyberpunk</small></div><div class="mini-card"><div class="icon">👻</div><b>CRT GHOST</b><small>Vaporwave</small></div><div class="mini-card"><div class="icon">💻</div><b>DATA PHANTOM</b><small>Darksynth</small></div></div>'
            }
        };

        function openWindow(page) {
            var o = document.getElementById('window-overlay');
            var t = document.getElementById('window-title');
            var b = document.getElementById('window-body');
            if (contents[page]) {
                t.textContent = contents[page].title;
                b.innerHTML = contents[page].body;
                o.classList.add('active');
            }
        }

        function closeWindowDirect() {
            document.getElementById('window-overlay').classList.remove('active');
        }

        function closeWindow(e) {
            if (e.target === document.getElementById('window-overlay')) {
                document.getElementById('window-overlay').classList.remove('active');
            }
        }

        var ctx = null, playing = false, osc = null, gain = null;

        function initAudio() {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                osc = ctx.createOscillator();
                gain = ctx.createGain();
                var f = ctx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, ctx.currentTime);
                f.type = 'lowpass';
                f.frequency.setValueAtTime(600, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                osc.connect(f); f.connect(gain); gain.connect(ctx.destination);
                osc.start();
                setInterval(function() {
                    if (playing && osc) osc.frequency.setValueAtTime(110 + Math.sin(Date.now()*0.001)*5, ctx.currentTime);
                }, 100);
            }
        }

        function togglePlay() {
            var btn = document.getElementById('play-btn');
            initAudio();
            if (ctx.state === 'suspended') ctx.resume();
            if (playing) {
                gain.gain.setValueAtTime(0, ctx.currentTime);
                btn.textContent = '▶';
                playing = false;
            } else {
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                btn.textContent = '⏸';
                playing = true;
            }
        }
    </script>
</body>
</html>
