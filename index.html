<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>M.Y.C | The Mayin Buu Club</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --black: #010508;
      --magenta: #d400ff;
      --magenta-glow: rgba(212, 0, 255, 0.7);
      --cyan: #00b8b8;
      --green-terminal: #00ff41;
      --white: #f0f0f0;
      --silver: #c0c0c0;
      --gray: #808080;
      --win95-blue: #000080;
      --bg-rosa: #ffaadd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: var(--black);
      height: 100vh;
      overflow: hidden;
      color: var(--white);
      user-select: none;
      cursor: none;
    }

    /* Cursor Ojo */
    #cursor-ojo {
      position: fixed; width: 32px; height: 32px; z-index: 99999;
      pointer-events: none; transition: transform 0.05s ease;
      filter: drop-shadow(0 0 15px var(--magenta-glow));
      top: 50%; left: 50%; opacity: 1;
    }
    #cursor-ojo.clicking { transform: scale(0.7); }
    #cursor-ojo.sobre-input { filter: drop-shadow(0 0 22px #ff00ff); }
    #cursor-ojo svg { width: 100%; height: 100%; }
    @media (max-width: 768px) {
      #cursor-ojo { display: none; }
      body { cursor: auto; }
    }

    /* Escritorio */
    #desktop-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #ffaadd 0%, #ffe0f0 50%, #ffffff 100%);
      z-index: 10; display: flex; flex-direction: column;
    }
    .desktop-area {
      flex: 1; position: relative; overflow: hidden; padding: 15px;
    }
    .desktop-icon {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      gap: 5px; cursor: pointer; padding: 8px; border-radius: 6px; width: 80px;
      text-align: center; color: #000; font-size: 10px; transition: 0.15s; z-index: 1;
    }
    .desktop-icon:hover { background: rgba(255,255,255,0.5); border: 1px dotted var(--gray); }
    .desktop-icon .icon-img { font-size: 36px; pointer-events: none; }
    .desktop-icon .icon-label { pointer-events: none; line-height: 1.2; }

    /* Ventana con scroll integrado */
    .window {
      position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 46px);
      background: #fff; z-index: 50; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,0.4); transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .window.open { transform: translateY(0); }
    .window-titlebar {
      background: linear-gradient(90deg, var(--win95-blue), #1084d0); color: white;
      padding: 10px 12px; display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: bold; height: 42px; flex-shrink: 0;
    }
    .window-close-btn {
      background: var(--silver); border: 2px solid; border-color: #fff var(--gray) var(--gray) #fff;
      width: 26px; height: 26px; cursor: pointer; font-size: 12px; font-weight: bold;
      display: flex; align-items: center; justify-content: center; color: #000;
    }
    .window-body {
      flex: 1; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch;
      color: #000; font-size: 13px; line-height: 1.6;
    }
    .window-body h3 { color: var(--win95-blue); margin-bottom: 15px; font-size: 18px; }
    .window-body p { margin-bottom: 12px; }

    /* Barra de tareas */
    .taskbar {
      height: 46px; background: var(--silver); border-top: 2px solid #fff;
      display: flex; align-items: center; padding: 3px 5px; gap: 6px; z-index: 200; flex-shrink: 0;
    }
    .start-btn {
      font-weight: bold; padding: 5px 14px; cursor: pointer; background: var(--silver);
      border: 2px solid; border-color: #fff var(--gray) var(--gray) #fff; font-family: inherit; font-size: 12px;
    }
    .taskbar-time { margin-left: auto; font-size: 11px; color: #000; }

    @media (max-width: 768px) {
      .desktop-icon { width: 70px; padding: 6px; }
      .desktop-icon .icon-img { font-size: 28px; }
      .window-body { padding: 15px; font-size: 12px; }
      .window-titlebar { font-size: 12px; height: 38px; }
    }
  </style>
</head>
<body>

  <div id="cursor-ojo">
    <svg viewBox="0 0 32 32">
      <ellipse cx="16" cy="16" rx="14" ry="10" fill="none" stroke="#d400ff" stroke-width="2"/>
      <circle cx="16" cy="16" r="5" fill="#d400ff" opacity="0.9"/>
      <circle cx="16" cy="16" r="2.5" fill="#fff"/>
      <path d="M2 16 L0 16 M30 16 L32 16 M16 2 L16 0 M16 30 L16 32" stroke="#d400ff" stroke-width="1.5"/>
    </svg>
  </div>

  <div id="desktop-screen">
    <div class="desktop-area" id="desktop-area"></div>

    <div class="taskbar">
      <button class="start-btn" onclick="toggleStartMenu()">🏠 Inicio</button>
      <button id="play-btn" onclick="togglePlay()" style="width:28px;height:28px;font-weight:bold;">▶</button>
      <span style="font-size:11px;color:#000;">SIGNAL FM</span>
      <div class="taskbar-time" id="taskbar-time">00:00</div>
    </div>
  </div>

  <script>
    // Cursor
    const cursorOjo = document.getElementById('cursor-ojo');
    document.addEventListener('mousemove', e => {
      cursorOjo.style.left = (e.clientX-16)+'px'; cursorOjo.style.top = (e.clientY-16)+'px';
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if(el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA')) cursorOjo.classList.add('sobre-input');
      else cursorOjo.classList.remove('sobre-input');
    });
    document.addEventListener('mousedown', () => cursorOjo.classList.add('clicking'));
    document.addEventListener('mouseup', () => cursorOjo.classList.remove('clicking'));

    // Audio
    let ctx, osc, gain, playing=false;
    function initAudio() { if(!ctx){ ctx=new(window.AudioContext||window.webkitAudioContext)(); osc=ctx.createOscillator(); gain=ctx.createGain(); osc.type='sawtooth'; osc.frequency.setValueAtTime(110,ctx.currentTime); gain.gain.setValueAtTime(0,ctx.currentTime); osc.connect(gain); gain.connect(ctx.destination); osc.start(); } }
    function togglePlay(){ const btn=document.getElementById('play-btn'); initAudio(); if(ctx.state==='suspended')ctx.resume(); if(playing){ gain.gain.setValueAtTime(0,ctx.currentTime); btn.textContent='▶'; playing=false; } else { gain.gain.setValueAtTime(0.12,ctx.currentTime); btn.textContent='⏸'; playing=true; } }

    // Reloj
    function updateClock(){ document.getElementById('taskbar-time').textContent = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
    setInterval(updateClock, 1000); updateClock();

    // Escritorio
    const area = document.getElementById('desktop-area');
    const iconos = [
      {id:'myc',i:'🎤',l:'M.Y.C',t:15,le:15},
      {id:'babybuus',i:'👶',l:"Baby Buu's",t:15,le:115},
      {id:'store',i:'💿',l:'Store',t:15,le:215},
      {id:'merch',i:'👕',l:'Merch',t:120,le:15},
      {id:'tours',i:'🌍',l:'Tours',t:120,le:115},
      {id:'artists',i:'🎨',l:'Artists',t:120,le:215}
    ];

    iconos.forEach(ic => {
      const el = document.createElement('div'); el.className='desktop-icon';
      el.style.top=ic.t+'px'; el.style.left=ic.le+'px';
      el.innerHTML=`<div class="icon-img">${ic.i}</div><span class="icon-label">${ic.l}</span>`;
      el.addEventListener('click', ()=>openWindow(ic.id));
      el.addEventListener('mousedown', e=>startDragIcon(e,el));
      area.appendChild(el);
    });

    let dIcon=null, dX=0, dY=0;
    function startDragIcon(e,el){ e.preventDefault(); dIcon=el; dX=e.clientX-el.offsetLeft; dY=e.clientY-el.offsetTop; }
    document.addEventListener('mousemove',e=>{ if(dIcon){ dIcon.style.left=(e.clientX-dX)+'px'; dIcon.style.top=(e.clientY-dY)+'px'; } });
    document.addEventListener('mouseup',()=>{ dIcon=null; });

    // Ventanas con scroll
    const contents = {
      'myc': { title:'M.Y.C — The Mayin Buu Club', body:'<h3>M.Y.C</h3><p>Chaos With Purpose.</p><p>Diseñado en Málaga. Visión Detroit. Proyección Mundial.</p><p>Fundado en 2024 como un sello independiente dedicado a la música electrónica de vanguardia.</p>' },
      'babybuus': { title:"Baby Buu's — Subsello Oficial", body:'<h3>Baby Buu\'s</h3><p>El subsello más experimental de M.Y.C. Sonidos lúdicos, rotos y sin reglas.</p><p>Artistas: Baby Buu, Glitch Kid, Neon Infant.</p>' },
      'store': { title:'Store — Discos y Vinilos', body:'<h3>💿 Store</h3><p>Neon Void Vol.1 — 24.99€</p><p>First Steps EP — 12.99€</p><p>Club Edits 001 — 18.00€</p><p>Synth Series 1-3 — 34.99€</p>' },
      'merch': { title:'Merch — Ropa y Accesorios', body:'<h3>👕 Merch</h3><p>Camiseta M.Y.C Logo — 29.99€</p><p>Gorra Baby Buu\'s — 22.00€</p><p>Tote Bag — 15.99€</p><p>Colgante Ed. Limitada — 45.00€</p>' },
      'tours': { title:'Tours — Próximas Fechas', body:'<h3>🌍 Tours</h3><p>15 DIC — Tokyo, Cyberdome</p><p>20 ENE — Berlin, Kraftwerk</p><p>14 FEB — Miami, Vice Club</p><p>08 MAR — London, Electric</p><p>22 ABR — CDMX, Foro Indie</p>' },
      'artists': { title:'Artists — Roster Oficial', body:'<h3>🎨 Artists</h3><p>🎹 VHS GLITCH — Synthwave / Darkwave</p><p>🎛️ TERMINAL X — Cyberpunk / Industrial</p><p>👻 CRT GHOST — Vaporwave / Ambient</p><p>💻 DATA PHANTOM — Darksynth / Retrowave</p>' }
    };

    function openWindow(id) {
      // Cerrar ventana anterior si existe
      const existente = document.querySelector('.window');
      if(existente) existente.remove();

      const data = contents[id] || { title:'Ventana', body:'<p>Contenido no disponible.</p>' };
      const win = document.createElement('div'); win.className='window';
      win.innerHTML = `
        <div class="window-titlebar">
          <span>${data.title}</span>
          <button class="window-close-btn" onclick="closeWindow()">✕</button>
        </div>
        <div class="window-body">${data.body}</div>
      `;
      document.getElementById('desktop-screen').appendChild(win);
      requestAnimationFrame(() => { win.classList.add('open'); });
    }

    function closeWindow() {
      const win = document.querySelector('.window');
      if(win) { win.classList.remove('open'); setTimeout(()=>win.remove(), 300); }
    }

    function toggleStartMenu() { closeWindow(); }
  </script>
</body>
</html>
