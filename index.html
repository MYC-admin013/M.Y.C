<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        :root {
            --bg: #008080;
            --gray: #c0c0c0;
            --dark: #808080;
            --darker: #404040;
            --light: #dfdfdf;
            --white: #ffffff;
            --black: #000000;
            --magenta: #d400ff;
            --desk: #0a6e6e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--desk);
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: default;
        }
        .desktop-wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 42px);
            background: linear-gradient(135deg, #0a5e5e 0%, #0a7a7a 50%, #0a6e6e 100%);
            z-index: 0;
        }
        .desktop-icons-area {
            position: relative;
            z-index: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 8px 5px;
            justify-content: start;
            min-height: calc(100vh - 42px);
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 6px;
            border: 1px solid transparent;
            width: 90px;
            text-align: center;
            background: none;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            color: var(--white);
            font-size: 11px;
            user-select: none;
            border-radius: 0;
        }
        .desktop-icon:hover {
            background: rgba(255,255,255,0.1);
            border: 1px dotted rgba(255,255,255,0.4);
        }
        .desktop-icon.selected {
            background: rgba(0,0,128,0.6);
            border: 1px dotted rgba(255,255,255,0.6);
        }
        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            pointer-events: none;
        }
        .desktop-icon .icon-label {
            color: var(--white);
            font-size: 11px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
            line-height: 1.2;
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: var(--gray);
            border-top: 2px solid var(--white);
            display: flex;
            align-items: center;
            padding: 3px 4px;
            z-index: 10000;
            gap: 4px;
        }
        .start-btn {
            background: var(--gray);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            padding: 4px 8px;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            height: 30px;
            user-select: none;
        }
        .start-btn:active {
            border-color: var(--dark) var(--white) var(--white) var(--dark);
        }
        .taskbar-divider {
            width: 2px;
            height: 28px;
            background: var(--dark);
            border-left: 1px solid var(--white);
        }
        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--black);
            padding: 2px 8px;
            background: var(--gray);
            border: 2px solid;
            border-color: var(--dark) var(--white) var(--white) var(--dark);
            height: 28px;
        }
        .taskbar-player button {
            background: var(--gray);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 10px;
            padding: 0;
        }
        .taskbar-player button:active {
            border-color: var(--dark) var(--white) var(--white) var(--dark);
        }
        .taskbar-time {
            margin-left: auto;
            font-size: 11px;
            color: var(--black);
            padding: 4px 10px;
            background: var(--gray);
            border: 2px solid;
            border-color: var(--dark) var(--white) var(--white) var(--dark);
        }
        .window-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 42px);
            z-index: 100;
        }
        .window-overlay.active {
            display: block;
        }
        .window-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--gray);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            box-shadow: 2px 2px 0 var(--black);
            min-width: 350px;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            z-index: 101;
        }
        .window-titlebar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: var(--white);
            padding: 3px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            cursor: default;
            user-select: none;
            height: 26px;
        }
        .window-close {
            background: var(--gray);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: var(--black);
            font-family: 'MS Sans Serif', sans-serif;
        }
        .window-close:active {
            border-color: var(--dark) var(--white) var(--white) var(--dark);
        }
        .window-body {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            background: var(--white);
            color: var(--black);
            font-size: 12px;
            line-height: 1.6;
        }
        .window-body h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #000080;
        }
        .window-body p {
            margin-bottom: 10px;
            font-size: 12px;
        }
        .win95-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .win95-card {
            background: var(--white);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            padding: 10px;
            cursor: pointer;
            font-size: 11px;
        }
        .win95-card:active {
            border-color: var(--dark) var(--white) var(--white) var(--dark);
        }
        .win95-card .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .win95-btn {
            background: var(--gray);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            padding: 6px 16px;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            font-size: 12px;
            cursor: pointer;
            color: var(--black);
        }
        .win95-btn:active {
            border-color: var(--dark) var(--white) var(--white) var(--dark);
        }
        .tour-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--dark);
            font-size: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tour-date {
            font-weight: bold;
            color: #000080;
            min-width: 60px;
        }
        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 4px;
            background: var(--gray);
            border: 2px solid;
            border-color: var(--white) var(--dark) var(--dark) var(--white);
            z-index: 10001;
            width: 180px;
            box-shadow: 2px 2px 0 var(--black);
        }
        .start-menu.active {
            display: block;
        }
        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--black);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
        }
        .start-menu-item:hover {
            background: #000080;
            color: var(--white);
        }
        .start-menu-divider {
            height: 1px;
            background: var(--dark);
            margin: 2px 4px;
            border-top: 1px solid var(--white);
        }
        @media (max-width: 768px) {
            .desktop-icons-area {
                grid-template-columns: repeat(2, 100px);
            }
            .window-box {
                width: 95%;
                min-width: auto;
                max-height: 60vh;
            }
        }
        @media (max-width: 480px) {
            .desktop-icons-area {
                grid-template-columns: repeat(2, 90px);
                gap: 4px;
            }
            .win95-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="desktop-wallpaper" onclick="deselectAll()"></div>

    <div class="desktop-icons-area" id="desktop-icons">
        <button class="desktop-icon" ondblclick="openWindow('myc')" onclick="selectIcon(this)">
            <div class="icon-img">🎤</div>
            <span class="icon-label">M.Y.C</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('store')" onclick="selectIcon(this)">
            <div class="icon-img">💿</div>
            <span class="icon-label">Store</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('merch')" onclick="selectIcon(this)">
            <div class="icon-img">👕</div>
            <span class="icon-label">Merch</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('tours')" onclick="selectIcon(this)">
            <div class="icon-img">🌍</div>
            <span class="icon-label">Tours</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('babybuus')" onclick="selectIcon(this)">
            <div class="icon-img">👶</div>
            <span class="icon-label">Baby Buu's</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('artists')" onclick="selectIcon(this)">
            <div class="icon-img">🎨</div>
            <span class="icon-label">Artists</span>
        </button>
    </div>

    <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
        <div class="window-box" id="window-box" onclick="event.stopPropagation()">
            <div class="window-titlebar">
                <span id="window-title">📁 Ventana</span>
                <button class="window-close" onclick="closeWindowDirect()">✕</button>
            </div>
            <div class="window-body" id="window-body"></div>
        </div>
    </div>

    <div class="start-menu" id="start-menu">
        <div class="start-menu-item" onclick="openWindow('myc'); toggleStart()">🎤 M.Y.C</div>
        <div class="start-menu-item" onclick="openWindow('store'); toggleStart()">💿 Store</div>
        <div class="start-menu-item" onclick="openWindow('merch'); toggleStart()">👕 Merch</div>
        <div class="start-menu-divider"></div>
        <div class="start-menu-item" onclick="openWindow('tours'); toggleStart()">🌍 Tours</div>
        <div class="start-menu-item" onclick="openWindow('babybuus'); toggleStart()">👶 Baby Buu's</div>
        <div class="start-menu-item" onclick="openWindow('artists'); toggleStart()">🎨 Artists</div>
    </div>

    <div class="taskbar">
        <button class="start-btn" onclick="toggleStart()">🏠 Inicio</button>
        <div class="taskbar-divider"></div>
        <div class="taskbar-player">
            <span>🎵</span>
            <button id="play-btn" onclick="togglePlay()">▶</button>
        </div>
        <div class="taskbar-time" id="taskbar-time"></div>
    </div>

    <script>
        function updateClock() {
            var now = new Date();
            var time = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('taskbar-time').textContent = time;
        }
        updateClock();
        setInterval(updateClock, 1000);

        function selectIcon(el) {
            document.querySelectorAll('.desktop-icon').forEach(function(icon) {
                icon.classList.remove('selected');
            });
            el.classList.add('selected');
        }

        function deselectAll() {
            document.querySelectorAll('.desktop-icon').forEach(function(icon) {
                icon.classList.remove('selected');
            });
        }

        function toggleStart() {
            document.getElementById('start-menu').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            var menu = document.getElementById('start-menu');
            var startBtn = document.querySelector('.start-btn');
            if (!menu.contains(e.target) && e.target !== startBtn && !startBtn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        var windowContents = {
            'myc': {
                title: 'M.Y.C — The Mayin Buu Club',
                body: '<h3>M.Y.C</h3><p>Fundado en 2024, <b>M.Y.C</b> es un sello discografico independiente dedicado a la musica electronica de vanguardia.</p><p>Nuestro catalogo abarca desde el synthwave mas nostalgico hasta el techno mas experimental.</p><div class="win95-grid"><div class="win95-card"><div class="icon">🎹</div><b>Produccion Musical</b><br><small>Estudio analogico y digital</small></div><div class="win95-card"><div class="icon">🎛️</div><b>Mastering</b><br><small>Mezcla profesional</small></div></div>'
            },
            'store': {
                title: 'STORE — Discos y Vinilos',
                body: '<h3>STORE</h3><div class="win95-grid"><div class="win95-card"><div class="icon">💿</div><b>VA - Neon Void Vol.1</b><br><small>24.99 - Vinilo</small></div><div class="win95-card"><div class="icon">📀</div><b>Baby Buu - First Steps EP</b><br><small>12.99 - Digital</small></div><div class="win95-card"><div class="icon">💾</div><b>M.Y.C - Club Edits 001</b><br><small>18.00 - Cassette</small></div><div class="win95-card"><div class="icon">🎵</div><b>Synth Series 1-3</b><br><small>34.99 - Box Set</small></div></div>'
            },
            'merch': {
                title: 'MERCH — Ropa y Accesorios',
                body: '<h3>MERCH</h3><div class="win95-grid"><div class="win95-card"><div class="icon">👕</div><b>Camiseta M.Y.C</b><br><small>29.99</small></div><div class="win95-card"><div class="icon">🧢</div><b>Gorra Baby Buu</b><br><small>22.00</small></div><div class="win95-card"><div class="icon">🎒</div><b>Tote Bag M.Y.C</b><br><small>15.99</small></div><div class="win95-card"><div class="icon">📿</div><b>Colgante Ed. Limitada</b><br><small>45.00</small></div></div>'
            },
            'tours': {
                title: 'TOURS — Proximas Fechas',
                body: '<h3>TOURS</h3><div class="tour-row"><span class="tour-date">15 DIC</span><span>Tokyo - Cyberdome</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">20 ENE</span><span>Berlin - Kraftwerk</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">14 FEB</span><span>Miami - Vice Club</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">08 MAR</span><span>London - Electric</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">22 ABR</span><span>CDMX - Foro Indie</span><button class="win95-btn">Tickets</button></div>'
            },
            'babybuus': {
                title: 'BABY BUUS — Subsello Oficial',
                body: '<h3>BABY BUUS</h3><p><b>Baby Buus</b> es el subsello de M.Y.C enfocado en sonidos mas experimentales y ludicos.</p><div class="win95-grid"><div class="win95-card"><div class="icon">🍼</div><b>Baby Buu</b><br><small>Artista principal</small></div><div class="win95-card"><div class="icon">🧸</div><b>First Steps EP</b><br><small>Vinilo 12" limitado</small></div></div>'
            },
            'artists': {
                title: 'ARTISTS — Roster Oficial',
                body: '<h3>ARTISTS</h3><div class="win95-grid"><div class="win95-card"><div class="icon">🎹</div><b>VHS GLITCH</b><br><small>Synthwave / Darkwave</small></div><div class="win95-card"><div class="icon">🎛️</div><b>TERMINAL X</b><br><small>Cyberpunk / Industrial</small></div><div class="win95-card"><div class="icon">👻</div><b>CRT GHOST</b><br><small>Vaporwave / Ambient</small></div><div class="win95-card"><div class="icon">💻</div><b>DATA PHANTOM</b><br><small>Darksynth / Retrowave</small></div></div>'
            }
        };

        function openWindow(page) {
            var overlay = document.getElementById('window-overlay');
            var titleEl = document.getElementById('window-title');
            var bodyEl = document.getElementById('window-body');
            if (windowContents[page]) {
                titleEl.textContent = windowContents[page].title;
                bodyEl.innerHTML = windowContents[page].body;
                overlay.classList.add('active');
            }
        }

        function closeWindowDirect() {
            document.getElementById('window-overlay').classList.remove('active');
        }

        function closeWindow(e) {
            if (e.target === document.getElementById('window-overlay')) {
                document.getElementById('window-overlay').classList.remove('active');
            }
        }

        var audioContext = null;
        var isPlaying = false;
        var oscNode = null;
        var gainNode = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                oscNode = audioContext.createOscillator();
                gainNode = audioContext.createGain();
                var filter = audioContext.createBiquadFilter();
                oscNode.type = 'sawtooth';
                oscNode.frequency.setValueAtTime(110, audioContext.currentTime);
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                oscNode.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscNode.start();
                setInterval(function() {
                    if (isPlaying && oscNode) {
                        var mod = 110 + Math.sin(Date.now() * 0.001) * 5;
                        oscNode.frequency.setValueAtTime(mod, audioContext.currentTime);
                    }
                }, 100);
            }
        }

        function togglePlay() {
            var btn = document.getElementById('play-btn');
            initAudio();
            if (audioContext.state === 'suspended') { audioContext.resume(); }
            if (isPlaying) {
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                btn.textContent = '▶';
                isPlaying = false;
            } else {
                gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                btn.textContent = '⏸';
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
