<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
            background: #010508;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        /* FONDO HACKING */
        .hack-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: #010508;
            overflow: hidden;
        }
        .code-column {
            position: absolute;
            top: -100px;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 11px;
            color: #00b8b8;
            opacity: 0.22;
            animation: codeFall var(--speed) linear infinite;
            animation-delay: var(--delay);
            white-space: nowrap;
            line-height: 1.5;
            letter-spacing: 1px;
            z-index: 0;
        }
        @keyframes codeFall {
            0% {
                transform: translateY(-100px);
            }
            100% {
                transform: translateY(110vh);
            }
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 3px);
            z-index: 1;
            pointer-events: none;
        }
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.8) 85%, #000 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* PARTÍCULAS */
        .particles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .particle-fast,
        .particle-mid,
        .particle-slow {
            position: absolute;
            border-radius: 50%;
            animation: floatUp var(--dur) infinite;
            opacity: 0;
        }
        .particle-fast {
            width: 1px;
            height: 1px;
            background: #00b8b8;
            --dur: 4s;
        }
        .particle-mid {
            width: 2px;
            height: 2px;
            background: #d400ff;
            --dur: 6s;
        }
        .particle-slow {
            width: 2px;
            height: 2px;
            background: #008888;
            --dur: 9s;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-10vh) scale(2);
                opacity: 0;
            }
        }

        /* CONTENEDOR */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 1.2s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* LOGO CENTRAL GRANDE */
        .logo-area {
            text-align: center;
            position: relative;
            z-index: 11;
        }
        .logo-emblem {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .logo-letter-big {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 35px rgba(212, 0, 255, 0.6), 0 0 70px rgba(255, 0, 140, 0.35);
            animation: neonPulse 3s ease-in-out infinite;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        }
        .logo-dot-big {
            font-size: 64px;
            font-weight: 900;
            color: #d400ff;
            text-shadow: 0 0 35px rgba(212, 0, 255, 0.8);
            animation: neonPulse 3s ease-in-out infinite;
        }
        @keyframes neonPulse {
            0%,
            100% {
                text-shadow: 0 0 35px rgba(212, 0, 255, 0.6), 0 0 70px rgba(255, 0, 140, 0.35);
            }
            50% {
                text-shadow: 0 0 55px rgba(212, 0, 255, 0.9), 0 0 90px rgba(255, 0, 140, 0.55);
            }
        }
        /* LUNA EMOJI GRANDE */
        .moon-emoji {
            font-size: 56px;
            animation: moonGlow 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.7)) drop-shadow(0 0 40px rgba(212, 0, 255, 0.5));
            display: inline-block;
        }
        @keyframes moonGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.7)) drop-shadow(0 0 40px rgba(212, 0, 255, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 55px rgba(212, 0, 255, 0.7));
            }
        }

        /* TEXTOS */
        .slogan {
            font-size: 15px;
            letter-spacing: 5px;
            color: #d400ff;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: 400;
            text-shadow: 0 0 15px rgba(212, 0, 255, 0.3);
            font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        }
        .tagline {
            font-size: 9px;
            letter-spacing: 3px;
            color: #666;
            text-transform: uppercase;
            margin-top: 4px;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        }
        .access-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 8px;
            letter-spacing: 2px;
            color: #555;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .access-code {
            background: rgba(0, 180, 180, 0.05);
            border: 1px solid rgba(0, 180, 180, 0.2);
            padding: 4px 10px;
            border-radius: 12px;
            color: #00b8b8;
            font-size: 9px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }
        .visitor-counter span {
            color: #d400ff;
        }
        .private-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(212, 0, 255, 0.06);
            border: 1px solid rgba(212, 0, 255, 0.18);
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 8px;
            letter-spacing: 2px;
            color: #d400ff;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ECUALIZADOR */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 16px;
            justify-content: center;
        }
        .eq-bar {
            width: 2px;
            background: linear-gradient(180deg, #d400ff, #00b8b8);
            border-radius: 1px;
            animation: eqBounce 0.7s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) {
            height: 7px;
            animation-delay: 0s;
        }
        .eq-bar:nth-child(2) {
            height: 12px;
            animation-delay: 0.08s;
        }
        .eq-bar:nth-child(3) {
            height: 5px;
            animation-delay: 0.16s;
        }
        .eq-bar:nth-child(4) {
            height: 15px;
            animation-delay: 0.24s;
        }
        .eq-bar:nth-child(5) {
            height: 9px;
            animation-delay: 0.32s;
        }
        .eq-bar:nth-child(6) {
            height: 13px;
            animation-delay: 0.4s;
        }
        .eq-bar:nth-child(7) {
            height: 4px;
            animation-delay: 0.48s;
        }
        .eq-bar:nth-child(8) {
            height: 10px;
            animation-delay: 0.56s;
        }
        @keyframes eqBounce {
            0%,
            100% {
                transform: scaleY(1);
            }
            50% {
                transform: scaleY(0.3);
            }
        }

        .divider {
            width: 45px;
            height: 1px;
            background: linear-gradient(90deg, #d400ff, #00b8b8, transparent);
            opacity: 0.5;
        }

        /* COOKIES */
        .cookie-banner {
            width: 100%;
            background: rgba(5, 8, 15, 0.9);
            border: 1px solid rgba(0, 180, 180, 0.15);
            border-radius: 4px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 10px;
            color: #777;
            backdrop-filter: blur(6px);
            transition: all 0.4s;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        }
        .cookie-banner.hidden {
            display: none;
        }
        .cookie-btns {
            display: flex;
            gap: 5px;
        }
        .cookie-btn {
            padding: 6px 12px;
            border: 1px solid #444;
            background: none;
            color: #aaa;
            cursor: pointer;
            font-size: 9px;
            border-radius: 14px;
            letter-spacing: 1px;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .cookie-btn:hover {
            border-color: #d400ff;
            color: #d400ff;
        }
        .cookie-btn.accept {
            background: #d400ff;
            border-color: #d400ff;
            color: #fff;
        }

        /* LOGIN PANEL */
        .login-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: all 0.5s ease;
        }
        .login-panel.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        .selectors-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .select-group {
            flex: 1;
            position: relative;
        }
        .select-group select {
            width: 100%;
            padding: 10px 12px;
            background: #0a0f15;
            border: 1px solid #2a2a35;
            border-radius: 4px;
            color: #ccc;
            font-size: 11px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .select-group::after {
            content: '▾';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #d400ff;
            font-size: 9px;
            pointer-events: none;
        }
        .input-field {
            width: 100%;
            padding: 13px 15px;
            background: #0a0f15;
            border: 1px solid #2a2a35;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #d400ff;
            box-shadow: 0 0 15px rgba(212, 0, 255, 0.08);
        }
        .input-field::placeholder {
            color: #555;
        }
        .btn-enter {
            width: 100%;
            padding: 14px;
            background: #d400ff;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-enter:hover {
            background: #e010ff;
            box-shadow: 0 0 25px rgba(212, 0, 255, 0.3);
        }
        .error-msg {
            color: #ff4060;
            font-size: 10px;
            text-align: center;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .password-hint {
            color: #555;
            font-size: 9px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* FOOTER */
        .legal-footer {
            position: fixed;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 8px;
            color: #3a3a3a;
            z-index: 5;
        }
        .legal-footer a {
            color: #3a3a3a;
            text-decoration: none;
            cursor: pointer;
        }
        .legal-footer a:hover {
            color: #00b8b8;
        }

        /* ESCRITORIO */
        #desktop-screen {
            display: none;
            min-height: 100vh;
            width: 100%;
            background: #0a6e6e;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        #desktop-screen.active {
            display: block;
        }
        .desktop-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: linear-gradient(135deg, #0a5e5e, #0a7a7a, #0a6e6e);
            z-index: 0;
        }
        .icons-area {
            position: relative;
            z-index: 1;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            width: 90px;
            background: none;
            border: 1px solid transparent;
            color: white;
            font-family: inherit;
            font-size: 11px;
        }
        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 1000;
            gap: 8px;
        }
        .start-btn {
            background: #d400ff;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            height: 30px;
            font-family: inherit;
        }
        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
        }
        .taskbar-player button {
            background: #d400ff;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }
        .taskbar-time {
            margin-left: auto;
            color: #ccc;
            font-size: 12px;
        }
        .logout-btn {
            background: none;
            border: 1px solid #d400ff;
            color: #d400ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }
        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 8px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            z-index: 1001;
            width: 170px;
        }
        .start-menu.active {
            display: block;
        }
        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .start-menu-item:hover {
            background: #d400ff;
            color: white;
        }
        .window-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .window-overlay.active {
            display: flex;
        }
        .window-box {
            background: #1a1a2e;
            border: 1px solid #d400ff;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 65vh;
            display: flex;
            flex-direction: column;
        }
        .window-titlebar {
            background: #0d0d1a;
            color: #d400ff;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
        }
        .window-close {
            background: none;
            border: none;
            color: #d400ff;
            font-size: 18px;
            cursor: pointer;
        }
        .window-body {
            padding: 16px;
            overflow-y: auto;
            color: #ccc;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .logo-letter-big {
                font-size: 42px;
            }
            .logo-dot-big {
                font-size: 42px;
            }
            .moon-emoji {
                font-size: 38px;
            }
            .slogan {
                font-size: 12px;
            }
            .selectors-row {
                flex-direction: column;
            }
            .legal-footer {
                bottom: 8px;
                left: 8px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="hack-bg" id="hack-bg"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="particles-layer" id="particles-layer"></div>

    <div id="login-screen">
        <div class="main-container" id="main-container">
            <div class="logo-area">
                <div class="logo-emblem">
                    <span class="logo-letter-big">M</span>
                    <span class="logo-dot-big">.</span>
                    <span class="logo-letter-big">Y</span>
                    <span class="logo-dot-big">.</span>
                    <span class="moon-emoji">🌙</span>
                </div>
                <div class="slogan" id="slogan-text">Chaos With Purpose</div>
                <div class="tagline" id="tagline-text">Designed in Málaga to the world</div>
                <div class="access-info">
                    <span class="access-code" id="access-code">#MYC-</span>
                    <span class="visitor-counter">VISITOR <span id="visitor-num">0001</span></span>
                </div>
                <span class="private-badge" id="private-badge">🔒 Private Access</span>
            </div>

            <div class="equalizer">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div>
            </div>

            <div class="divider"></div>

            <div class="cookie-banner" id="cookie-banner">
                <span id="cookie-text">🍪 Usamos cookies.</span>
                <div class="cookie-btns">
                    <button class="cookie-btn" id="cookie-reject" onclick="rejectCookies()">Rechazar</button>
                    <button class="cookie-btn accept" id="cookie-accept" onclick="acceptCookies()">Aceptar</button>
                </div>
            </div>

            <div class="login-panel" id="login-panel">
                <div class="selectors-row">
                    <div class="select-group">
                        <select id="lang-select" onchange="updateTranslations()">
                            <option value="ES">🌐 Español</option><option value="EN">🌐 English</option>
                            <option value="IT">🌐 Italiano</option><option value="FR">🌐 Français</option>
                            <option value="DE">🌐 Deutsch</option><option value="POR">🌐 Português</option>
                        </select>
                    </div>
                </div>
                <input type="text" class="input-field" id="email-input" placeholder="Email o teléfono">
                <input type="password" class="input-field" id="password-input" placeholder="Contraseña">
                <div class="error-msg" id="error-msg"></div>
                <div class="password-hint" id="password-hint">🔑 Pista: La fecha más importante</div>
                <button class="btn-enter" id="btn-enter" onclick="login()">Entrar</button>
            </div>
        </div>
        <div class="legal-footer">
            <a id="legal-terms">Términos</a><a id="legal-privacy">Privacidad</a><a id="legal-help">Ayuda</a>
        </div>
    </div>

    <div id="desktop-screen">
        <div class="desktop-bg"></div>
        <div class="icons-area">
            <button class="desktop-icon" ondblclick="openWindow('myc')"><div class="icon-img">🎤</div><span class="icon-label">M.Y.C</span></button>
            <button class="desktop-icon" ondblclick="openWindow('store')"><div class="icon-img">💿</div><span class="icon-label">Store</span></button>
            <button class="desktop-icon" ondblclick="openWindow('merch')"><div class="icon-img">👕</div><span class="icon-label">Merch</span></button>
            <button class="desktop-icon" ondblclick="openWindow('tours')"><div class="icon-img">🌍</div><span class="icon-label">Tours</span></button>
            <button class="desktop-icon" ondblclick="openWindow('babybuus')"><div class="icon-img">👶</div><span class="icon-label">Baby Buu's</span></button>
            <button class="desktop-icon" ondblclick="openWindow('artists')"><div class="icon-img">🎨</div><span class="icon-label">Artists</span></button>
        </div>
        <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
            <div class="window-box" onclick="event.stopPropagation()">
                <div class="window-titlebar"><span id="window-title"></span><button class="window-close" onclick="closeWindowDirect()">✕</button></div>
                <div class="window-body" id="window-body"></div>
            </div>
        </div>
        <div class="start-menu" id="start-menu">
            <div class="start-menu-item" onclick="openWindow('myc');toggleStart()">🎤 M.Y.C</div>
            <div class="start-menu-item" onclick="openWindow('store');toggleStart()">💿 Store</div>
            <div class="start-menu-item" onclick="openWindow('merch');toggleStart()">👕 Merch</div>
            <div class="start-menu-item" onclick="openWindow('tours');toggleStart()">🌍 Tours</div>
            <div class="start-menu-item" onclick="openWindow('babybuus');toggleStart()">👶 Baby Buu's</div>
            <div class="start-menu-item" onclick="openWindow('artists');toggleStart()">🎨 Artists</div>
            <div style="border-top:1px solid #333;margin:4px 0;"></div>
            <div class="start-menu-item" onclick="logout()">🚪 Cerrar sesión</div>
        </div>

        function initAudio() { if (!ctx) { ctx = new(window.AudioContext || window.webkitAudioContext)();
                osc = ctx.createOscillator();
                gain = ctx.createGain(); var f = ctx.createBiquadFilter();

                osc.frequency.setValueAtTime(110, ctx.currentTime);
                f.type = 'lowpass';
                f.frequency.setValueAtTime(600, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                osc.connect(f);
                f.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setInterval(function() { if (playing && osc) osc.frequency.setValueAtTime(110 + Math.sin(Date.now() *
