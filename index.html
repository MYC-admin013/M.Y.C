<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>M.Y.C | Acceso Restringido</title>
  <style>
    :root {
      --negro: #010508;
      --magenta: #d400ff;
      --magenta-brillo: rgba(212, 0, 255, 0.8);
      --cyan: #00b8b8;
      --verde-terminal: #00ff41;
      --blanco: #f0f0f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--negro);
      height: 100vh;
      overflow: hidden;
      color: var(--blanco);
      cursor: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========== CURSOR OJO (GUARDIÁN) ========== */
    #cursor-ojo {
      position: fixed; width: 38px; height: 38px; z-index: 99999;
      pointer-events: none; transition: transform 0.1s ease;
      filter: drop-shadow(0 0 18px var(--magenta));
    }
    #cursor-ojo.clicking { transform: scale(0.75); }

    /* ========== PANTALLA 1: EL DESPERTAR (NEGRO PURO) ========== */
    #fase1-negro {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 100; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    .logo-despertar {
      font-size: 100px; font-weight: 900; letter-spacing: 25px; color: #fff;
      text-shadow: 0 0 70px var(--magenta-brillo); opacity: 0;
      animation: aparecerLogo 0.8s ease-out forwards;
    }
    @keyframes aparecerLogo { 0% { opacity: 0; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    .logo-despertar .ojo-c-despertar {
      display: inline-block; width: 70px; height: 45px; vertical-align: middle;
      animation: latidoOjo 2s ease-in-out infinite;
    }
    @keyframes latidoOjo { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .texto-iniciando {
      margin-top: 30px; font-size: 22px; color: #aaa; letter-spacing: 12px;
      opacity: 0; animation: mostrarTexto 0.5s 0.5s forwards, pulsoTexto 2s 1s infinite;
    }
    @keyframes mostrarTexto { to { opacity: 1; } }
    @keyframes pulsoTexto { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ========== PANTALLA 2: EL PORTAL (MORADO HACKER) ========== */
    #fase2-boot {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #1c0035 0%, #010508 100%);
      z-index: 90; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Courier New', monospace; color: var(--verde-terminal);
    }
    .contenedor-boot {
      max-width: 900px; width: 90%; padding: 50px;
      border-left: 2px solid rgba(0, 255, 65, 0.3);
      position: relative;
    }
    .linea-boot {
      opacity: 0; font-size: 18px; margin: 8px 0; white-space: pre-wrap;
      animation: escribirLinea 0.25s forwards;
    }
    @keyframes escribirLinea { to { opacity: 1; } }
    
    /* Bola de discoteca sutil en el fondo */
    .bola-discoteca {
      position: absolute; top: 50%; right: -60px; width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(212,0,255,0.4), transparent 70%);
      border-radius: 50%; filter: blur(20px); animation: girarBola 6s linear infinite;
    }
    @keyframes girarBola { 100% { transform: rotate(360deg); } }

    /* Mensajes Subliminales */
    .mensaje-fantasma {
      position: fixed; font-family: 'Courier New', monospace; font-size: 14px;
      color: var(--cyan); opacity: 0; z-index: 95; pointer-events: none;
      animation: flotar 7s ease-in-out infinite;
    }
    @keyframes flotar {
      0% { opacity: 0; transform: translateY(0); }
      25% { opacity: 0.8; }
      50% { opacity: 0; transform: translateY(-40px); }
      100% { opacity: 0; }
    }

    /* ========== PANTALLA 3: EL ACCESO (REGISTRO) ========== */
    #fase3-registro {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 80; display: none;
      font-family: 'Courier New', monospace; color: var(--verde-terminal);
      align-items: center; justify-content: center;
    }
    .formulario-acceso {
      border: 2px solid var(--verde-terminal); padding: 60px;
      max-width: 550px; width: 90%; box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
    }
    .formulario-acceso input {
      background: #000; border: none; border-bottom: 2px solid var(--verde-terminal);
      color: var(--verde-terminal); font-family: inherit; font-size: 20px;
      padding: 14px 0; width: 100%; outline: none; margin-bottom: 15px;
    }
    .btn-acceso {
      background: var(--verde-terminal); color: #000; border: none;
      padding: 16px 45px; font-family: inherit; font-size: 20px; font-weight: bold;
      cursor: pointer; margin-top: 30px; letter-spacing: 4px; transition: 0.2s;
    }
    .btn-acceso:hover { background: #fff; box-shadow: 0 0 40px rgba(0, 255, 65, 0.6); }
  </style>
</head>
<body>

  <!-- CURSOR OJO -->
  <div id="cursor-ojo">
    <svg width="38" height="38" viewBox="0 0 38 38">
      <ellipse cx="19" cy="19" rx="17" ry="12" fill="none" stroke="#d400ff" stroke-width="2.5"/>
      <circle cx="19" cy="19" r="7" fill="#d400ff" opacity="0.9"/>
      <circle cx="19" cy="19" r="3.5" fill="#fff"/>
      <path d="M2 19 L0 19 M36 19 L38 19 M19 2 L19 0 M19 36 L19 38" stroke="#d400ff" stroke-width="2.5"/>
    </svg>
  </div>

  <!-- FASE 1: NEGRO -->
  <div id="fase1-negro">
    <div class="logo-despertar">M<span style="color:var(--magenta);">.</span>Y<span style="color:var(--magenta);">.</span>
      <svg class="ojo-c-despertar" viewBox="0 0 38 38">
        <ellipse cx="19" cy="19" rx="17" ry="12" fill="none" stroke="#d400ff" stroke-width="2.5"/>
        <circle cx="19" cy="19" r="7" fill="#d400ff" opacity="0.9"/>
        <circle cx="19" cy="19" r="3.5" fill="#fff"/>
      </svg>
    </div>
    <div class="texto-iniciando">INICIANDO...</div>
  </div>

  <!-- FASE 2: BOOT + SUBLIMINALES -->
  <div id="fase2-boot">
    <div class="contenedor-boot" id="texto-boot">
      <div class="bola-discoteca"></div>
    </div>
    <div class="mensaje-fantasma" style="top:12%;left:6%;animation-delay:0s;">ACCESO_RESTRINGIDO</div>
    <div class="mensaje-fantasma" style="top:80%;right:5%;animation-delay:3.5s;">DETROIT_VISION</div>
    <div class="mensaje-fantasma" style="top:45%;left:85%;animation-delay:6s;">MALAGA_BASE</div>
  </div>

  <!-- FASE 3: REGISTRO -->
  <div id="fase3-registro">
    <div class="formulario-acceso">
      <p style="font-size:26px;margin-bottom:30px;">> NUEVO USUARIO_</p>
      <label>> USUARIO:</label>
      <input type="text" id="reg-usuario" placeholder="username">
      <label>> EMAIL:</label>
      <input type="email" id="reg-email" placeholder="email@club.xxx">
      <label>> CONTRASEÑA:</label>
      <input type="password" id="reg-contrasena" placeholder="········">
      <label>> CODIGO DE ACCESO:</label>
      <input type="text" id="reg-codigo" value="23/10/2026" readonly style="opacity:0.6;">
      <p id="reg-nivel" style="margin-top:25px;font-size:16px;">NIVEL: DEFAULT</p>
      <button class="btn-acceso" onclick="procesarAcceso()">ACCEDER</button>
    </div>
  </div>

  <script>
    // ============ CURSOR ============
    const cursorOjo = document.getElementById('cursor-ojo');
    document.addEventListener('mousemove', e => { cursorOjo.style.left = (e.clientX-19)+'px'; cursorOjo.style.top = (e.clientY-19)+'px'; });
    document.addEventListener('mousedown', () => cursorOjo.classList.add('clicking'));
    document.addEventListener('mouseup', () => cursorOjo.classList.remove('clicking'));

    // ============ SONIDOS ============
    let ctxAudio;
    function getCtx() { if(!ctxAudio) ctxAudio = new (window.AudioContext||window.webkitAudioContext)(); return ctxAudio; }
    function playSound(freq, type, dur=0.1, vol=0.05) {
      const ctx = getCtx(); const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime);
      g.gain.setValueAtTime(vol, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+dur);
    }

    // ============ SECUENCIA DE INICIO ============
    setTimeout(() => {
      const fase1 = document.getElementById('fase1-negro');
      fase1.style.opacity = '0';
      setTimeout(() => {
        fase1.style.display = 'none';
        document.getElementById('fase2-boot').style.display = 'flex';
        iniciarSecuenciaBoot();
      }, 800);
    }, 2000);

    const lineasBoot = [
      'M.Y.C SECURE SYSTEM v.2024',
      '──────────────────────────────────────────',
      'INITIALIZING CORE MODULES...',
      'ESTABLISHING CONNECTION TO DETROIT RELAY...',
      'MÁLAGA NODE: ONLINE',
      'DETROIT RELAY: ACTIVE',
      'ENCRYPTING CHANNEL... 256-BIT AES',
      'ACCESS GATEWAY: OPEN',
      'LOADING USER DATABASE...',
      '[████████████████████████████████] 100%',
      '',
      '> WELCOME. CREATE YOUR CREDENTIALS._'
    ];
    let iLinea = 0;
    function iniciarSecuenciaBoot() {
      if (iLinea < lineasBoot.length) {
        const linea = document.createElement('div'); linea.className = 'linea-boot';
        linea.textContent = lineasBoot[iLinea];
        document.getElementById('texto-boot').appendChild(linea);
        playSound(800, 'square', 0.05, 0.02);
        iLinea++;
        setTimeout(iniciarSecuenciaBoot, 220 + Math.random() * 100);
      } else {
        setTimeout(() => {
          document.getElementById('fase2-boot').style.display = 'none';
          document.getElementById('fase3-registro').style.display = 'flex';
        }, 1000);
      }
    }

    // ============ REGISTRO ============
    function procesarAcceso() {
      const u = document.getElementById('reg-usuario').value.trim();
      const e = document.getElementById('reg-email').value.trim();
      const p = document.getElementById('reg-contrasena').value.trim();
      if(!u||!e||!p) { alert('> ERROR: Todos los campos son obligatorios.'); return; }
      
      let nivel = 'DEFAULT', descuento = '';
      if(p === 'MYC-FOUNDER-2024') { nivel = 'FOUNDER'; descuento = '50% DESCUENTO ACTIVADO'; }
      else if(document.getElementById('reg-codigo').value === '23/10/2026') { nivel = 'VIP'; descuento = '23% DESCUENTO ACTIVADO'; }
      
      document.getElementById('reg-nivel').innerHTML = `NIVEL: ${nivel} <span style="color:#d400ff;">${descuento}</span>`;
      localStorage.setItem('usuario_myc', JSON.stringify({usuario:u, email:e, nivel}));
      
      playSound(1200, 'sine', 0.2, 0.1);
      setTimeout(() => playSound(1500, 'sine', 0.25, 0.1), 150);
      
      alert(`> ACCESO CONCEDIDO. BIENVENIDO, ${u}. [NIVEL: ${nivel}]`);
      // Aquí se cargará el escritorio en el futuro.
    }
  </script>
</body>
</html>
