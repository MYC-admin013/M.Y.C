<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        :root {
            --win95-bg: #008080;
            --win95-gray: #c0c0c0;
            --win95-dark: #808080;
            --win95-darker: #404040;
            --win95-light: #dfdfdf;
            --win95-white: #ffffff;
            --win95-black: #000000;
            --magenta: #d400ff;
            --magenta-glow: rgba(212, 0, 255, 0.4);
            --desktop-bg: #0a6e6e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--desktop-bg);
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: default;
            -webkit-font-smoothing: none;
            image-rendering: pixelated;
        }

        /* ============ FONDO DE ESCRITORIO ============ */
        .desktop-wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 42px);
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
                linear-gradient(135deg, #0a5e5e 0%, #0a7a7a 50%, #0a6e6e 100%);
            z-index: 0;
        }

        .desktop-wallpaper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.3) 100%);
        }

        /* ============ ICONOS DEL ESCRITORIO ============ */
        .desktop-icons-area {
            position: relative;
            z-index: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 8px 5px;
            justify-content: start;
            align-content: start;
            min-height: calc(100vh - 42px);
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 6px;
            border-radius: 0;
            border: 1px solid transparent;
            transition: none;
            width: 90px;
            text-align: center;
            background: none;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            color: var(--win95-white);
            font-size: 11px;
            user-select: none;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px dotted rgba(255, 255, 255, 0.4);
        }

        .desktop-icon.selected {
            background: rgba(0, 0, 128, 0.6);
            border: 1px dotted rgba(255, 255, 255, 0.6);
        }

        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        .desktop-icon .icon-label {
            color: var(--win95-white);
            font-size: 11px;
            letter-spacing: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
            line-height: 1.2;
        }

        /* ============ BARRA DE TAREAS ============ */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: var(--win95-gray);
            border-top: 2px solid var(--win95-white);
            box-shadow: 0 -1px 0 var(--win95-dark);
            display: flex;
            align-items: center;
            padding: 3px 4px;
            z-index: 10000;
            gap: 4px;
        }

        .start-btn {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            padding: 4px 8px;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 30px;
            user-select: none;
        }

        .start-btn:active {
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
        }

        .start-btn .start-icon {
            font-size: 16px;
        }

        .taskbar-divider {
            width: 2px;
            height: 28px;
            background: var(--win95-dark);
            border-left: 1px solid var(--win95-white);
        }

        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--win95-black);
            padding: 2px 8px;
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
            height: 28px;
        }

        .taskbar-player button {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .taskbar-player button:active {
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
        }

        .taskbar-time {
            margin-left: auto;
            font-size: 11px;
            color: var(--win95-black);
            padding: 4px 10px;
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
        }

        /* ============ VENTANAS ============ */
        .window-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 42px);
            z-index: 100;
            pointer-events: none;
        }

        .window-overlay.active {
            display: block;
            pointer-events: all;
        }

        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            box-shadow: 2px 2px 0 var(--win95-black);
            min-width: 350px;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            z-index: 101;
        }

        .window-titlebar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: var(--win95-white);
            padding: 3px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            cursor: default;
            user-select: none;
            height: 26px;
        }

        .window-titlebar span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .window-close {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            color: var(--win95-black);
            font-family: 'MS Sans Serif', sans-serif;
        }

        .window-close:active {
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
        }

        .window-body {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            background: var(--win95-white);
            color: var(--win95-black);
            font-size: 12px;
            line-height: 1.6;
        }

        .window-body h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #000080;
        }

        .window-body p {
            margin-bottom: 10px;
            font-size: 12px;
        }

        .win95-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .win95-card {
            background: var(--win95-white);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            padding: 10px;
            cursor: pointer;
            font-size: 11px;
        }

        .win95-card:active {
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
        }

        .win95-card .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .win95-btn {
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            padding: 6px 16px;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
            font-size: 12px;
            cursor: pointer;
            color: var(--win95-black);
        }

        .win95-btn:active {
            border-color: var(--win95-dark) var(--win95-white) var(--win95-white) var(--win95-dark);
        }

        .tour-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--win95-dark);
            font-size: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tour-date {
            font-weight: bold;
            color: #000080;
            min-width: 60px;
        }

        /* ============ MENÚ INICIO ============ */
        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 4px;
            background: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-white) var(--win95-dark) var(--win95-dark) var(--win95-white);
            z-index: 10001;
            width: 180px;
            padding: 0;
            box-shadow: 2px 2px 0 var(--win95-black);
        }

        .start-menu.active {
            display: block;
        }

        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--win95-black);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
        }

        .start-menu-item:hover {
            background: #000080;
            color: var(--win95-white);
        }

        .start-menu-divider {
            height: 1px;
            background: var(--win95-dark);
            margin: 2px 4px;
            border-top: 1px solid var(--win95-white);
        }

        @media (max-width: 768px) {
            .desktop-icons-area {
                grid-template-columns: repeat(2, 100px);
            }
            .window {
                width: 95%;
                min-width: auto;
                max-height: 60vh;
            }
        }

        @media (max-width: 480px) {
            .desktop-icons-area {
                grid-template-columns: repeat(2, 90px);
                gap: 4px;
            }
            .win95-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo de escritorio -->
    <div class="desktop-wallpaper"></div>

    <!-- Iconos del escritorio -->
    <div class="desktop-icons-area" id="desktop-icons">
        <button class="desktop-icon" ondblclick="openWindow('myc')" onclick="selectIcon(this)">
            <div class="icon-img">🎤</div>
            <span class="icon-label">M.Y.C</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('store')" onclick="selectIcon(this)">
            <div class="icon-img">💿</div>
            <span class="icon-label">Store</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('merch')" onclick="selectIcon(this)">
            <div class="icon-img">👕</div>
            <span class="icon-label">Merch</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('tours')" onclick="selectIcon(this)">
            <div class="icon-img">🌍</div>
            <span class="icon-label">Tours</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('babybuus')" onclick="selectIcon(this)">
            <div class="icon-img">👶</div>
            <span class="icon-label">Baby Buu's</span>
        </button>
        <button class="desktop-icon" ondblclick="openWindow('artists')" onclick="selectIcon(this)">
            <div class="icon-img">🎨</div>
            <span class="icon-label">Artists</span>
        </button>
    </div>

    <!-- Ventanas -->
    <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
        <div class="window" id="window-box" onclick="event.stopPropagation()">
            <div class="window-titlebar">
                <span id="window-title">📁 Ventana</span>
                <button class="window-close" onclick="closeWindowDirect()">✕</button>
            </div>
            <div class="window-body" id="window-body"></div>
        </div>
    </div>

    <!-- Menú Inicio -->
    <div class="start-menu" id="start-menu">
        <div class="start-menu-item" onclick="openWindow('myc'); toggleStart()">🎤 M.Y.C</div>
        <div class="start-menu-item" onclick="openWindow('store'); toggleStart()">💿 Store</div>
        <div class="start-menu-item" onclick="openWindow('merch'); toggleStart()">👕 Merch</div>
        <div class="start-menu-divider"></div>
        <div class="start-menu-item" onclick="openWindow('tours'); toggleStart()">🌍 Tours</div>
        <div class="start-menu-item" onclick="openWindow('babybuus'); toggleStart()">👶 Baby Buu's</div>
        <div class="start-menu-item" onclick="openWindow('artists'); toggleStart()">🎨 Artists</div>
    </div>

    <!-- Barra de tareas -->
    <div class="taskbar">
        <button class="start-btn" onclick="toggleStart()">
            <span class="start-icon">🏠</span> Inicio
        </button>
        <div class="taskbar-divider"></div>
        <div class="taskbar-player">
            <span>🎵</span>
            <button id="play-btn" onclick="togglePlay()">▶</button>
        </div>
        <div class="taskbar-time" id="taskbar-time"></div>
    </div>

    <script>
        // ============ RELOJ ============
        function updateClock() {
            var now = new Date();
            var time = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('taskbar-time').textContent = time;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ============ SELECCIÓN DE ICONOS ============
        function selectIcon(el) {
            document.querySelectorAll('.desktop-icon').forEach(function(icon) {
                icon.classList.remove('selected');
            });
            el.classList.add('selected');
        }

        // Clic en el fondo: deseleccionar
        document.querySelector('.desktop-wallpaper').addEventListener('click', function() {
            document.querySelectorAll('.desktop-icon').forEach(function(icon) {
                icon.classList.remove('selected');
            });
        });

        // ============ MENÚ INICIO ============
        function toggleStart() {
            var menu = document.getElementById('start-menu');
            menu.classList.toggle('active');
        }

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', function(e) {
            var menu = document.getElementById('start-menu');
            var startBtn = document.querySelector('.start-btn');
            if (!menu.contains(e.target) && e.target !== startBtn && !startBtn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // ============ VENTANAS ============
        var windowContents = {
            'myc': {
                title: '📁 M.Y.C — The Mayin Buu Club',
                body: '<h3>🎤 M.Y.C</h3><p>Fundado en 2024, <b>M.Y.C</b> es un sello discográfico independiente dedicado a la música electrónica de vanguardia.</p><p>Nuestro catálogo abarca desde el synthwave más nostálgico hasta el techno más experimental.</p><div class="win95-grid"><div class="win95-card"><div class="icon">🎹</div><b>Producción Musical</b><br><small>Estudio analógico y digital</small></div><div class="win95-card"><div class="icon">🎛️</div><b>Mastering</b><br><small>Mezcla profesional</small></div></div>'
            },
            'store': {
                title: '📁 STORE — Discos y Vinilos',
                body: '<h3>💿 STORE</h3><div class="win95-grid"><div class="win95-card"><div class="icon">💿</div><b>VA — Neon Void Vol.1</b><br><small>€24.99 — Vinilo</small></div><div class="win95-card"><div class="icon">📀</div><b>Baby Buu\'s — First Steps EP</b><br><small>€12.99 — Digital</small></div><div class="win95-card"><div class="icon">💾</div><b>M.Y.C — Club Edits 001</b><br><small>€18.00 — Cassette</small></div><div class="win95-card"><div class="icon">🎵</div><b>Synth Series 1-3</b><br><small>€34.99 — Box Set</small></div></div>'
            },
            'merch': {
                title: '📁 MERCH — Ropa y Accesorios',
                body: '<h3>👕 MERCH</h3><div class="win95-grid"><div class="win95-card"><div class="icon">👕</div><b>Camiseta M.Y.C</b><br><small>€29.99</small></div><div class="win95-card"><div class="icon">🧢</div><b>Gorra Baby Buu\'s</b><br><small>€22.00</small></div><div class="win95-card"><div class="icon">🎒</div><b>Tote Bag M.Y.C</b><br><small>€15.99</small></div><div class="win95-card"><div class="icon">📿</div><b>Colgante Ed. Limitada</b><br><small>€45.00</small></div></div>'
            },
            'tours': {
                title: '📁 TOURS — Próximas Fechas',
                body: '<h3>🌍 TOURS</h3><div class="tour-row"><span class="tour-date">15 DIC</span><span>Tokyo — Cyberdome</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">20 ENE</span><span>Berlin — Kraftwerk</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">14 FEB</span><span>Miami — Vice Club</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">08 MAR</span><span>London — Electric</span><button class="win95-btn">Tickets</button></div><div class="tour-row"><span class="tour-date">22 ABR</span><span>CDMX — Foro Indie</span><button class="win95-btn">Tickets</button></div>'
            },
            'babybuus': {
                title: '📁 BABY BUU\'S — Subsello Oficial',
                body: '<h3>👶 BABY BUU\'S</h3><p><b>Baby Buu\'s</b> es el subsello de M.Y.C enfocado en sonidos más experimentales y lúdicos.</p><div class="win95-grid"><div class="win95-card"><div class="icon">🍼</div><b>Baby Buu</b><br><small>Artista principal</small></div><div class="win95-card"><div class="icon">🧸</div><b>First Steps EP</b><br><small>Vinilo 12" limitado</small></div></div>'
            },
            'artists': {
                title: '📁 ARTISTS — Roster Oficial',
                body: '<h3>🎨 ARTISTS</h3><div class="win95-grid"><div class="win95-card"><div class="icon">🎹</div><b>VHS GLITCH</b><br><small>Synthwave / Darkwave</small></div><div class="win95-card"><div class="icon">🎛️</div><b>TERMINAL X</b><br><small>Cyberpunk / Industrial</small></div><div class="win95-card"><div class="icon">👻</div><b>CRT GHOST</b><br><small>Vaporwave / Ambient</small></div><div class="win95-card"><div class="icon">💻</div><b>DATA PHANTOM</b><br><small>Darksynth / Retrowave</small></div></div>'
            }
        };

        function openWindow(page) {
            var overlay = document.getElementById('window-overlay');
            var titleEl = document.getElementById('window-title');
            var bodyEl = document.getElementById('window-body');

            if (windowContents[page]) {
                titleEl.textContent = windowContents[page].title;
                bodyEl.innerHTML = windowContents[page].body;
                overlay.classList.add('active');
            }
        }

        function closeWindowDirect() {
            document.getElementById('window-overlay').classList.remove('active');
        }

        function closeWindow(e) {
            if (e.target === document.getElementById('window-overlay')) {
                document.getElementById('window-overlay').classList.remove('active');
            }
        }

        // ============ REPRODUCTOR ============
        var audioContext = null;
        var isPlaying = false;
        var oscNode = null;
        var gainNode = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new(window.AudioContext || window.webkitAudioContext)();
                oscNode = audioContext.createOscillator();
                gainNode = audioContext.createGain();
                var filter = audioContext.createBiquadFilter();
                oscNode.type = 'sawtooth';
                oscNode.frequency.setValueAtTime(110, audioContext.currentTime);
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                oscNode.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscNode.start();
                setInterval(function() {
                    if (isPlaying && oscNode) {
                        var mod = 110 + Math.sin(Date.now() * 0.001) * 5;
                        oscNode.frequency.setValueAtTime(mod, audioContext.currentTime);
                    }
                }, 100);
            }
        }

        function togglePlay() {
            var btn = document.getElementById('play-btn');
            initAudio();
            if (audioContext.state === 'suspended') { audioContext.resume(); }
            if (isPlaying) {
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                btn.textContent = '▶';
                isPlaying = false;
            } else {
                gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                btn.textContent = '⏸';
                isPlaying = true;
            }
        }

        // Doble clic en iconos para abrir
        document.querySelectorAll('.desktop-icon').forEach(function(icon) {
            icon.addEventListener('dblclick', function() {
                var label = this.querySelector('.icon-label').textContent.toLowerCase();
                var pageMap = {
                    'm.y.c': 'myc',
                    'store': 'store',
                    'merch': 'merch',
                    'tours': 'tours',
                    "baby buu's": 'babybuus',
                    'artists': 'artists'
                };
                var page = pageMap[label] || label.replace(/[^a-z]/g, '');
                openWindow(page);
            });
        });
    </script>
</body>
</html>
