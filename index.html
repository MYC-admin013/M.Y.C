<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0010;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo atmosférico */
        .atmosphere {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(180, 0, 255, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(255, 0, 180, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(120, 0, 200, 0.1) 0%, transparent 50%),
                #0a0010;
            z-index: 0;
            animation: atmospherePulse 8s ease-in-out infinite;
        }

        @keyframes atmospherePulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.85;
            }
        }

        /* Partículas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d400ff;
            border-radius: 50%;
            animation: floatUp 6s infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        /* Contenedor principal */
        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 40px 30px;
            background: rgba(10, 0, 20, 0.8);
            border: 1px solid rgba(212, 0, 255, 0.3);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(180, 0, 255, 0.2), 0 0 120px rgba(255, 0, 180, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffffff;
            text-align: center;
            text-shadow: 0 0 30px rgba(212, 0, 255, 0.6);
        }

        .logo span {
            color: #d400ff;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 5px;
            color: #999;
            text-transform: uppercase;
            margin-top: -15px;
        }

        .input-group {
            width: 100%;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(20, 0, 30, 0.8);
            border: 1px solid rgba(212, 0, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #d400ff;
            box-shadow: 0 0 20px rgba(212, 0, 255, 0.3);
        }

        .input-group input::placeholder {
            color: #666;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d400ff, #ff00b4);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-login:hover {
            box-shadow: 0 0 40px rgba(212, 0, 255, 0.5);
            transform: scale(1.02);
        }

        .error-msg {
            color: #ff4060;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* KID BUU */
        .kid-buu {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .kid-buu:hover {
            transform: scale(1.1);
        }

        .kid-buu:active {
            transform: scale(0.95);
        }

        .kid-buu-head {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 40% 35%, #ffaadd, #d400ff 60%, #4a0080);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 0 30px rgba(212, 0, 255, 0.6), 0 0 60px rgba(255, 0, 180, 0.3);
            animation: buuFloat 3s ease-in-out infinite;
        }

        @keyframes buuFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* Ojos */
        .kid-buu-head::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 18px;
            width: 14px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            box-shadow: 30px 0 0 #000;
        }

        /* Ojos blancos */
        .kid-buu-head::after {
            content: '';
            position: absolute;
            top: 27px;
            left: 21px;
            width: 6px;
            height: 7px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 30px 0 0 #fff;
        }

        /* Boca */
        .buu-mouth {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            border: 2px solid #000;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        /* Tooltip de contraseña */
        .password-tooltip {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #d400ff;
            color: #d400ff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 25;
            box-shadow: 0 0 20px rgba(212, 0, 255, 0.4);
            animation: fadeInTooltip 0.3s ease;
        }

        .password-tooltip.show {
            display: block;
        }

        @keyframes fadeInTooltip {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .logo {
                font-size: 22px;
            }
            .kid-buu-head {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo atmosférico -->
    <div class="atmosphere"></div>

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <!-- Login -->
    <div class="login-container" id="login-screen">
        <div class="logo">THE <span>MAYIN BUU</span> CLUB</div>
        <div class="subtitle">M.Y.C — Access Portal</div>

        <div class="input-group">
            <input type="text" id="email-input" placeholder="Email o número de teléfono">
        </div>

        <div class="input-group">
            <input type="password" id="password-input" placeholder="Contraseña">
        </div>

        <div class="error-msg" id="error-msg">Credenciales incorrectas</div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>

    <!-- Kid Buu -->
    <div class="kid-buu" onclick="showPassword()" title="¿Olvidaste la contraseña?">
        <div class="kid-buu-head">
            <div class="buu-mouth"></div>
        </div>
    </div>

    <!-- Tooltip contraseña -->
    <div class="password-tooltip" id="password-tooltip">
        🔑 Contraseña: <b>23/10/2026</b>
    </div>

    <script>
        // Crear partículas
        var particlesContainer = document.getElementById('particles');
        for (var i = 0; i < 30; i++) {
            var particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (4 + Math.random() * 6) + 's';
            particlesContainer.appendChild(particle);
        }

        // Mostrar contraseña al hacer clic en Kid Buu
        function showPassword() {
            var tooltip = document.getElementById('password-tooltip');
            tooltip.classList.toggle('show');

            // Ocultar después de 4 segundos
            if (tooltip.classList.contains('show')) {
                setTimeout(function() {
                    tooltip.classList.remove('show');
                }, 4000);
            }
        }

        // Login
        function login() {
            var email = document.getElementById('email-input').value.trim();
            var password = document.getElementById('password-input').value.trim();
            var errorMsg = document.getElementById('error-msg');

            if (!email) {
                errorMsg.textContent = 'Ingresa tu email o teléfono';
                errorMsg.classList.add('show');
                return;
            }

            if (password === '23/10/2026') {
                errorMsg.classList.remove('show');
                // Redirigir al escritorio
                window.location.href = 'escritorio.html';
            } else {
                errorMsg.textContent = 'Contraseña incorrecta. ¿Probaste a hacer clic en Kid Buu?';
                errorMsg.classList.add('show');
            }
        }

        // Permitir Enter para login
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        document.getElementById('email-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password-input').focus();
            }
        });
    </script>
</body>
</html>
