<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Y.C — The Mayin Buu Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            background: #050010;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ATMÓSFERA CON TEXTURA */
        .atmosphere {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(180, 0, 255, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 50%, rgba(255, 0, 150, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(100, 0, 200, 0.1) 0%, transparent 45%),
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(212, 0, 255, 0.03) 3px, rgba(212, 0, 255, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(180, 0, 255, 0.02) 3px, rgba(180, 0, 255, 0.02) 4px);
            z-index: 0;
            pointer-events: none;
            animation: atmosPulse 5s ease-in-out infinite;
        }

        @keyframes atmosPulse {
            0%,
            100% {
                opacity: 0.85;
            }
            50% {
                opacity: 1;
            }
        }

        /* PARTÍCULAS */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d400ff;
            border-radius: 50%;
            animation: floatUp 7s infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(2);
                opacity: 0;
            }
        }

        /* CONTENEDOR LOGIN */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* LOGO CON GLITCH + ANILLOS */
        .logo-area {
            text-align: center;
            margin-bottom: 5px;
            position: relative;
        }
        .rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            pointer-events: none;
        }
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(212, 0, 255, 0.2);
            border-radius: 50%;
            animation: ringExpand 3s ease-out infinite;
        }
        .ring:nth-child(1) {
            width: 60px;
            height: 60px;
            animation-delay: 0s;
        }
        .ring:nth-child(2) {
            width: 90px;
            height: 90px;
            animation-delay: 1s;
        }
        .ring:nth-child(3) {
            width: 120px;
            height: 120px;
            animation-delay: 2s;
        }
        @keyframes ringExpand {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(0.8);
            }
            50% {
                opacity: 0.15;
                transform: translate(-50%, -50%) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.6);
            }
        }
        .logo-text {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 10px;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 40px rgba(212, 0, 255, 0.7), 0 0 80px rgba(255, 0, 150, 0.4), 0 0 120px rgba(180, 0, 255, 0.3);
            animation: neonPulse 3s ease-in-out infinite, glitchSkew 5s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }
        @keyframes neonPulse {
            0%,
            100% {
                text-shadow: 0 0 40px rgba(212, 0, 255, 0.7), 0 0 80px rgba(255, 0, 150, 0.4);
            }
            50% {
                text-shadow: 0 0 70px rgba(212, 0, 255, 1), 0 0 120px rgba(255, 0, 150, 0.7), 0 0 150px rgba(200, 0, 255, 0.5);
            }
        }
        @keyframes glitchSkew {
            0%,
            90%,
            100% {
                transform: skew(0deg);
            }
            92% {
                transform: skew(2deg);
            }
            94% {
                transform: skew(-1deg);
            }
            96% {
                transform: skew(0deg);
            }
        }
        .logo-dot {
            color: #d400ff;
        }
        .slogan {
            font-size: 16px;
            letter-spacing: 5px;
            color: #d400ff;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 400;
            text-shadow: 0 0 20px rgba(212, 0, 255, 0.5);
        }
        .tagline {
            font-size: 10px;
            letter-spacing: 3px;
            color: #777;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .private-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 0, 255, 0.08);
            border: 1px solid rgba(212, 0, 255, 0.25);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #d400ff;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ECUALIZADOR */
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 24px;
            justify-content: center;
        }
        .eq-bar {
            width: 3px;
            background: linear-gradient(180deg, #d400ff, #ff0090);
            border-radius: 2px;
            animation: eqBounce 0.8s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) {
            height: 10px;
            animation-delay: 0s;
        }
        .eq-bar:nth-child(2) {
            height: 18px;
            animation-delay: 0.1s;
        }
        .eq-bar:nth-child(3) {
            height: 8px;
            animation-delay: 0.2s;
        }
        .eq-bar:nth-child(4) {
            height: 22px;
            animation-delay: 0.3s;
        }
        .eq-bar:nth-child(5) {
            height: 14px;
            animation-delay: 0.4s;
        }
        .eq-bar:nth-child(6) {
            height: 20px;
            animation-delay: 0.5s;
        }
        .eq-bar:nth-child(7) {
            height: 6px;
            animation-delay: 0.6s;
        }
        .eq-bar:nth-child(8) {
            height: 16px;
            animation-delay: 0.7s;
        }
        @keyframes eqBounce {
            0%,
            100% {
                transform: scaleY(1);
            }
            50% {
                transform: scaleY(0.4);
            }
        }

        /* LÍNEA DIVISORIA */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #d400ff, #ff0090, transparent);
            margin: 0 auto;
            opacity: 0.7;
        }

        /* COOKIES */
        .cookie-banner {
            width: 100%;
            background: rgba(20, 5, 30, 0.9);
            border: 1px solid rgba(212, 0, 255, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 11px;
            color: #999;
            backdrop-filter: blur(10px);
            transition: all 0.4s;
        }
        .cookie-banner.hidden {
            display: none;
        }
        .cookie-btns {
            display: flex;
            gap: 6px;
        }
        .cookie-btn {
            padding: 7px 14px;
            border: 1px solid #444;
            background: none;
            color: #aaa;
            cursor: pointer;
            font-size: 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .cookie-btn:hover {
            border-color: #d400ff;
            color: #d400ff;
        }
        .cookie-btn.accept {
            background: #d400ff;
            border-color: #d400ff;
            color: #fff;
        }

        /* LOGIN PANEL */
        .login-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
            transition: all 0.5s ease;
        }
        .login-panel.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }
        .selectors-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .select-group {
            flex: 1;
            position: relative;
        }
        .select-group select {
            width: 100%;
            padding: 12px 14px;
            background: #0d0d1a;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            color: #ccc;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .select-group::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #d400ff;
            font-size: 10px;
            pointer-events: none;
        }
        .select-group select:focus {
            border-color: #d400ff;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #0d0d1a;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #d400ff;
            box-shadow: 0 0 20px rgba(212, 0, 255, 0.12);
        }
        .input-field::placeholder {
            color: #555;
        }
        .btn-enter {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #d400ff, #b000d0);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-enter:hover {
            background: linear-gradient(135deg, #e010ff, #c000e0);
            box-shadow: 0 0 35px rgba(212, 0, 255, 0.4);
            transform: translateY(-1px);
        }
        .error-msg {
            color: #ff4060;
            font-size: 11px;
            text-align: center;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .password-hint {
            color: #555;
            font-size: 10px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* FOOTER LEGAL */
        .legal-footer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 10px;
            color: #444;
            z-index: 5;
        }
        .legal-footer a {
            color: #444;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }
        .legal-footer a:hover {
            color: #d400ff;
        }

        /* BOLA DE DISCOTECA */
        .disco-ball-container {
            position: fixed;
            bottom: 30px;
            right: 25px;
            z-index: 30;
            pointer-events: none;
        }
        .disco-ball {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 40% 35%, #fff 5%, #e0e0e0 15%, #c0c0c0 30%, #888 50%, #555 70%, #333 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px rgba(212, 0, 255, 0.5), 0 0 80px rgba(255, 255, 255, 0.2);
            animation: spinDisco 4s linear infinite;
        }
        @keyframes spinDisco {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .disco-ball::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(0, 0, 0, 0.25) 6px,
                    rgba(0, 0, 0, 0.25) 8px),
                repeating-linear-gradient(90deg, transparent, transparent 6px, rgba(0, 0, 0, 0.25) 6px, rgba(0, 0, 0, 0.25) 8px);
        }
        .disco-ball::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.7) 0%, transparent 70%);
            border-radius: 50%;
        }
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            animation: sparkleBurst 0.7s ease-out forwards;
            box-shadow: 0 0 8px #d400ff, 0 0 18px #ff00b4, 0 0 25px #fff;
        }
        @keyframes sparkleBurst {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1);
                opacity: 0;
            }
        }

        /* ESCRITORIO */
        #desktop-screen {
            display: none;
            min-height: 100vh;
            width: 100%;
            background: #0a6e6e;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        #desktop-screen.active {
            display: block;
        }
        .desktop-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: linear-gradient(135deg, #0a5e5e, #0a7a7a, #0a6e6e);
            z-index: 0;
        }
        .icons-area {
            position: relative;
            z-index: 1;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            width: 90px;
            background: none;
            border: 1px solid transparent;
            color: white;
            font-family: inherit;
            font-size: 11px;
        }
        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .desktop-icon .icon-img {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            pointer-events: none;
        }
        .desktop-icon .icon-label {
            color: white;
            font-size: 11px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            text-align: center;
            pointer-events: none;
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 1000;
            gap: 8px;
        }
        .start-btn {
            background: #d400ff;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            height: 30px;
            font-family: inherit;
        }
        .taskbar-player {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 12px;
        }
        .taskbar-player button {
            background: #d400ff;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }
        .taskbar-time {
            margin-left: auto;
            color: #ccc;
            font-size: 12px;
        }
        .logout-btn {
            background: none;
            border: 1px solid #d400ff;
            color: #d400ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }
        .start-menu {
            display: none;
            position: fixed;
            bottom: 46px;
            left: 8px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 6px;
            z-index: 1001;
            width: 170px;
            overflow: hidden;
        }
        .start-menu.active {
            display: block;
        }
        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .start-menu-item:hover {
            background: #d400ff;
            color: white;
        }
        .window-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 42px;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .window-overlay.active {
            display: flex;
        }
        .window-box {
            background: #1a1a2e;
            border: 1px solid #d400ff;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 65vh;
            display: flex;
            flex-direction: column;
        }
        .window-titlebar {
            background: #0d0d1a;
            color: #d400ff;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
            border-bottom: 1px solid #d400ff;
        }
        .window-close {
            background: none;
            border: none;
            color: #d400ff;
            font-size: 18px;
            cursor: pointer;
        }
        .window-body {
            padding: 16px;
            overflow-y: auto;
            color: #ccc;
            font-size: 13px;
        }
        .window-body h3 {
            color: #d400ff;
        }
        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .mini-card {
            background: #0d0d1a;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
        }
        .mini-card:hover {
            border-color: #d400ff;
        }
        .mini-card .icon {
            font-size: 30px;
        }
        .tour-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3e;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tour-date {
            color: #d400ff;
            font-weight: bold;
            min-width: 60px;
        }
        .btn-sm {
            background: #d400ff;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }

        @media (max-width: 600px) {
            .logo-text {
                font-size: 34px;
                letter-spacing: 6px;
            }
            .slogan {
                font-size: 13px;
            }
            .selectors-row {
                flex-direction: column;
            }
            .legal-footer {
                bottom: 10px;
                left: 10px;
                gap: 10px;
                font-size: 9px;
            }
            .icons-area {
                justify-content: center;
            }
            .mini-grid {
                grid-template-columns: 1fr;
            }
            .disco-ball {
                width: 55px;
                height: 55px;
            }
            .disco-ball-container {
                bottom: 20px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="atmosphere"></div>
    <div class="particles" id="particles"></div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="main-container">
            <div class="logo-area">
                <div class="rings">
                    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                </div>
                <div class="logo-text">M<span class="logo-dot">.</span>Y<span class="logo-dot">.</span>C</div>
                <div class="slogan">Chaos With Purpose</div>
                <div class="tagline">Designed in Málaga to the world</div>
                <span class="private-badge">🔒 Private Access</span>
            </div>

            <div class="equalizer">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div>
            </div>

            <div class="divider"></div>

            <div class="cookie-banner" id="cookie-banner">
                <span>🍪 Usamos cookies para mejorar tu experiencia.</span>
                <div class="cookie-btns">
                    <button class="cookie-btn" onclick="rejectCookies()">Rechazar</button>
                    <button class="cookie-btn accept" onclick="acceptCookies()">Aceptar todo</button>
                </div>
            </div>

            <div class="login-panel" id="login-panel">
                <div class="selectors-row">
                    <div class="select-group">
                        <select><option>🌍 España</option><option>🌍 Italia</option><option>🌍 France</option><option>🌍 English</option><option>🌍 Deutschland</option><option>🌍 Portugal</option></select>
                    </div>
                    <div class="select-group">
                        <select><option>🌐 Español</option><option>🌐 Italiano</option><option>🌐 Français</option><option>🌐 English</option><option>🌐 Deutsch</option><option>🌐 Português</option></select>
                    </div>
                </div>
                <input type="text" class="input-field" id="email-input" placeholder="Email o número de teléfono">
                <input type="password" class="input-field" id="password-input" placeholder="Contraseña">
                <div class="error-msg" id="error-msg"></div>
                <div class="password-hint">🔑 Pista: La fecha más importante del club</div>
                <button class="btn-enter" onclick="login()">Entrar</button>
            </div>
        </div>
        <div class="legal-footer">
            <a>Términos y condiciones</a><a>Privacidad</a><a>Ayuda</a><a>Accesibilidad</a>
        </div>
    </div>

    <!-- BOLA DE DISCOTECA -->
    <div class="disco-ball-container" id="disco-ball-container">
        <div class="disco-ball"></div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop-screen">
        <div class="desktop-bg"></div>
        <div class="icons-area">
            <button class="desktop-icon" ondblclick="openWindow('myc')"><div class="icon-img">🎤</div><span class="icon-label">M.Y.C</span></button>
            <button class="desktop-icon" ondblclick="openWindow('store')"><div class="icon-img">💿</div><span class="icon-label">Store</span></button>
            <button class="desktop-icon" ondblclick="openWindow('merch')"><div class="icon-img">👕</div><span class="icon-label">Merch</span></button>
            <button class="desktop-icon" ondblclick="openWindow('tours')"><div class="icon-img">🌍</div><span class="icon-label">Tours</span></button>
            <button class="desktop-icon" ondblclick="openWindow('babybuus')"><div class="icon-img">👶</div><span class="icon-label">Baby Buu's</span></button>
            <button class="desktop-icon" ondblclick="openWindow('artists')"><div class="icon-img">🎨</div><span class="icon-label">Artists</span></button>
        </div>
        <div class="window-overlay" id="window-overlay" onclick="closeWindow(event)">
            <div class="window-box" onclick="event.stopPropagation()">
                <div class="window-titlebar"><span id="window-title"></span><button class="window-close" onclick="closeWindowDirect()">✕</button></div>
                <div class="window-body" id="window-body"></div>
            </div>
        </div>
        <div class="start-menu" id="start-menu">
            <div class="start-menu-item" onclick="openWindow('myc');toggleStart()">🎤 M.Y.C</div>
            <div class="start-menu-item" onclick="openWindow('store');toggleStart()">💿 Store</div>
            <div class="start-menu-item" onclick="openWindow('merch');toggleStart()">👕 Merch</div>
            <div class="start-menu-item" onclick="openWindow('tours');toggleStart()">🌍 Tours</div>
            <div class="start-menu-item" onclick="openWindow('babybuus');toggleStart()">👶 Baby Buu's</div>
            <div class="start-menu-item" onclick="openWindow('artists');toggleStart()">🎨 Artists</div>
            <div style="border-top:1px solid #333;margin:4px 0;"></div>
            <div class="start-menu-item" onclick="logout()">🚪 Cerrar sesión</div>
        </div>
        <div class="taskbar">
            <button class="start-btn" onclick="toggleStart()">🏠 Inicio</button>
            <div class="taskbar-player"><span>🎵 SYNTH</span><button id="play-btn" onclick="togglePlay()">▶</button></div>
            <button class="logout-btn" onclick="logout()">Salir</button>
            <div class="taskbar-time" id="taskbar-time"></div>
        </div>
    </div>

    <script>
        var pc = document.getElementById('particles');
        for (var i = 0; i < 35; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 7 + 's';
            p.style.animationDuration = (5 + Math.random() * 6) + 's';
            pc.appendChild(p);
        }
        var ball = document.getElementById('disco-ball-container');

        function sparkle() {
            var s = document.createElement('div');
            s.className = 'sparkle';
            var a = Math.random() * 360;
            var d = 25 + Math.random() * 55;
            s.style.setProperty('--dx', Math.cos(a * Math.PI / 180) * d + 'px');
            s.style.setProperty('--dy', Math.sin(a * Math.PI / 180) * d + 'px');
            s.style.left = '37px';
            s.style.top = '37px';
            ball.appendChild(s);
            setTimeout(function() { s.remove(); }, 700);
        }
        setInterval(sparkle, 1800);

        function acceptCookies() { document.getElementById('cookie-banner').classList.add('hidden');
            document.getElementById('login-panel').classList.add('visible'); }

        function rejectCookies() { document.getElementById('cookie-banner').classList.add('hidden');
            document.getElementById('login-panel').classList.add('visible'); }

        function login() {
            var e = document.getElementById('email-input').value.trim();
            var p = document.getElementById('password-input').value.trim();
            var err = document.getElementById('error-msg');
            if (!e) { err.textContent = 'Ingresa tu email o telefono';
                err.classList.add('show'); return; }
            if (p === '23/10/2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('desktop-screen').classList.add('active');
                updateClock();
                setInterval(updateClock, 1000);
            } else { err.textContent = 'Contrasena incorrecta';
                err.classList.add('show'); }
        }
        document.getElementById('password-input').addEventListener('keypress', function(ev) { if (ev.key === 'Enter')
            login(); });

        function logout() {
            document.getElementById('desktop-screen').classList.remove('active');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('password-input').value = '';
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('cookie-banner').classList.remove('hidden');
            document.getElementById('login-panel').classList.remove('visible');
        }

        function updateClock() { var d = new Date(); var el = document.getElementById('taskbar-time'); if (el) el
                .textContent = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }); }

        function toggleStart() { document.getElementById('start-menu').classList.toggle('active'); }
        document.addEventListener('click', function(ev) { var m = document.getElementById('start-menu'); var b = document
                .querySelector('.start-btn'); if (m && !m.contains(ev.target) && ev.target !== b && !b.contains(ev.target))
                m.classList.remove('active'); });

        var c = {
            'myc': { title: 'M.Y.C', body: '<h3>M.Y.C</h3><p>Sello independiente. Chaos With Purpose.</p>' },
            'store': { title: 'STORE',
                body: '<h3>STORE</h3><div class="mini-grid"><div class="mini-card"><div class="icon">💿</div><b>Neon Void Vol.1</b></div></div>' },
            'merch': { title: 'MERCH',
                body: '<h3>MERCH</h3><div class="mini-grid"><div class="mini-card"><div class="icon">👕</div><b>Camiseta</b></div></div>' },
            'tours': { title: 'TOURS',
                body: '<h3>TOURS</h3><div class="tour-line"><span class="tour-date">15 DIC</span>Tokyo</div>' },
            'babybuus': { title: 'BABY BUUS', body: '<h3>BABY BUUS</h3><p>Subsello experimental.</p>' },
            'artists': { title: 'ARTISTS',
                body: '<h3>ARTISTS</h3><div class="mini-grid"><div class="mini-card"><div class="icon">🎹</div><b>VHS GLITCH</b></div></div>' }
        };

        function openWindow(p) { var o = document.getElementById('window-overlay'); var t = document.getElementById(
                'window-title'); var b = document.getElementById('window-body'); if (c[p]) { t.textContent = c[p].title;
                b.innerHTML = c[p].body;
                o.classList.add('active'); } }

        function closeWindowDirect() { document.getElementById('window-overlay').classList.remove('active'); }

        function closeWindow(ev) { if (ev.target === document.getElementById('window-overlay')) document.getElementById(
                'window-overlay').classList.remove('active'); }

        var ctx = null,
            playing = false,
            osc = null,
            gain = null;

        function initAudio() { if (!ctx) { ctx = new(window.AudioContext || window.webkitAudioContext)();
                osc = ctx.createOscillator();
                gain = ctx.createGain(); var f = ctx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, ctx.currentTime);
                f.type = 'lowpass';
                f.frequency.setValueAtTime(600, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                osc.connect(f);
                f.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setInterval(function() { if (playing && osc) osc.frequency.setValueAtTime(110 + Math.sin(Date.now() *
                        0.001) * 5, ctx.currentTime); }, 100); } }

        function togglePlay() { var btn = document.getElementById('play-btn');
            initAudio(); if (ctx.state === 'suspended') ctx.resume(); if (playing) { gain.gain.setValueAtTime(0, ctx
                    .currentTime);
                btn.textContent = '▶';
                playing = false; } else { gain.gain.setValueAtTime(0.15, ctx.currentTime);
                btn.textContent = '⏸';
                playing = true; } }
    </script>
</body>
</html>
