<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title id="tab-title">◉ M.Y.C TRANSMISSION</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d400ff'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff'/%3E%3C/svg%3E" id="favicon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --black: #010508;
            --deep-black: #000000;
            --magenta: #d400ff;
            --magenta-glow: rgba(212, 0, 255, 0.8);
            --cyan: #00b8b8;
            --green-terminal: #00ff41;
            --white: #f0f0f0;
            --gray: #808080;
            --silver: #c0c0c0;
            --win95-blue: #000080;
            --bg-rosa: #ffaadd;
            --danger: #ff0040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: var(--deep-black);
            min-height: 100vh;
            overflow: hidden;
            color: var(--white);
            user-select: none;
            cursor: none;
        }

        /* ============ CURSOR OJO MEJORADO ============ */
        #cursor-ojo {
            position: fixed;
            width: 40px;
            height: 40px;
            z-index: 99999;
            pointer-events: none;
            transition: transform 0.06s ease, filter 0.2s ease, width 0.2s, height 0.2s;
            filter: drop-shadow(0 0 20px var(--magenta-glow));
            top: 50%;
            left: 50%;
            opacity: 1;
        }
        #cursor-ojo.magnetic {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 35px #ff00ff);
        }
        #cursor-ojo.clicking {
            transform: scale(0.65);
        }
        #cursor-ojo.sobre-input {
            filter: drop-shadow(0 0 28px #ff00ff);
        }
        #cursor-ojo svg {
            width: 100%;
            height: 100%;
        }
        @media (max-width: 768px) {
            #cursor-ojo {
                display: none;
            }
            body {
                cursor: auto;
            }
        }

        /* Trail del cursor */
        .cursor-trail {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--magenta);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            opacity: 0.6;
            animation: fadeTrail 0.5s ease-out forwards;
        }
        @keyframes fadeTrail {
            to {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* ============ GLITCH IMPERFECCIÓN CONTROLADA ============ */
        @keyframes glitchSystem {
            0%,
            100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(3px);
                filter: hue-rotate(90deg);
            }
        }
        @keyframes glitchText {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
                text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta);
            }
        }
        .glitch-sistema {
            animation: glitchSystem 0.15s ease;
        }
        .glitch-texto {
            animation: glitchText 0.2s ease;
        }

        /* ============ SCARCITY - MENSAJES TEMPORALES ============ */
        .mensaje-temporal {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px 25px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 3px;
            z-index: 500;
            animation: aparecerDesaparecer 4s ease forwards;
            pointer-events: none;
        }
        @keyframes aparecerDesaparecer {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            85% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        /* ============ DELAYED REVEALS ============ */
        .reveal-delayed {
            opacity: 0;
            animation: revealDelay 1.5s ease forwards;
        }
        @keyframes revealDelay {
            0% {
                opacity: 0;
                transform: translateY(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ SONIDO ============ */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 10px 18px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .sound-toggle:hover {
            background: var(--magenta);
            color: #000;
            transform: scale(1.05);
        }
        .sound-toggle.muted {
            border-color: #444;
            color: #444;
        }

        /* ============ FOOTER VIVO ============ */
        .footer-vivo {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: #333;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .footer-vivo span {
            color: var(--magenta);
        }
        .footer-vivo .alerta {
            color: var(--danger);
            animation: glitchText 0.3s ease;
        }

        /* ============ PANTALLAS ============ */
        .pantalla {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .pantalla.activa {
            display: flex;
        }

        /* Fase 1 */
        #fase1-inicio {
            background: #000;
            z-index: 100;
            transition: opacity 0.8s ease, background 1s ease;
        }
        #fase1-inicio.modo-morado {
            background: radial-gradient(circle at center, #1a0030, #000);
        }
        #fase1-inicio.oculto {
            opacity: 0;
            pointer-events: none;
        }
        .logo-inicio {
            font-size: clamp(60px, 10vw, 100px);
            font-weight: 900;
            letter-spacing: 20px;
            color: #fff;
            text-shadow: 0 0 80px var(--magenta-glow);
            animation: aparecerLogo 1s ease-out forwards;
        }
        @keyframes aparecerLogo {
            0% {
                opacity: 0;
                transform: scale(1.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .logo-inicio .punto {
            color: var(--magenta);
        }
        .texto-iniciando {
            margin-top: 35px;
            font-size: clamp(18px, 3vw, 24px);
            color: #aaa;
            letter-spacing: 12px;
            opacity: 0;
            animation: mostrarTexto 0.8s 0.8s forwards, pulsoTexto 2.5s 1.5s infinite;
        }
        @keyframes mostrarTexto {
            to {
                opacity: 1;
            }
        }
        @keyframes pulsoTexto {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        /* Fase 2 */
        #fase2-boot {
            background: radial-gradient(ellipse at center, #1c0035 0%, #010508 100%);
            z-index: 90;
            color: var(--green-terminal);
        }
        .capa-codigo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .columna-codigo {
            position: absolute;
            top: -100px;
            font-size: 12px;
            color: var(--cyan);
            opacity: 0.2;
            animation: caerCodigo linear infinite;
            white-space: pre;
            line-height: 1.4;
        }
        @keyframes caerCodigo {
            0% {
                transform: translateY(-100px);
            }
            100% {
                transform: translateY(110vh);
            }
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 3px);
            pointer-events: none;
            z-index: 1;
        }
        .contenedor-boot {
            max-width: 900px;
            width: 90%;
            padding: 50px;
            border-left: 3px solid rgba(0, 255, 65, 0.4);
            position: relative;
            z-index: 3;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }
        .linea-boot {
            opacity: 0;
            font-size: 18px;
            margin: 8px 0;
            animation: escribirLinea 0.3s forwards;
        }
        @keyframes escribirLinea {
            to {
                opacity: 1;
            }
        }
        .mensaje-fantasma {
            position: fixed;
            font-size: 14px;
            color: var(--cyan);
            opacity: 0;
            z-index: 95;
            pointer-events: none;
        }

        /* Fase 3 */
        #fase3-registro {
            background: #000;
            z-index: 80;
            color: var(--green-terminal);
        }
        .formulario-acceso {
            border: 2px solid var(--green-terminal);
            padding: clamp(30px, 5vw, 60px);
            max-width: 550px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }
        .formulario-acceso input {
            background: #000;
            border: none;
            border-bottom: 2px solid var(--green-terminal);
            color: var(--green-terminal);
            font-family: inherit;
            font-size: 20px;
            padding: 14px 0;
            width: 100%;
            outline: none;
            caret-color: #ff00ff;
        }
        .btn-acceso {
            background: var(--green-terminal);
            color: #000;
            border: none;
            padding: 16px 50px;
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            margin-top: 35px;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            width: 100%;
            cursor: pointer;
        }
        .btn-acceso:hover {
            background: #fff;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.7);
            transform: scale(1.02);
        }
        .btn-acceso:active {
            transform: scale(0.98);
        }
        .nivel-info {
            margin-top: 25px;
            font-size: 18px;
            text-align: center;
        }

        /* ============ ESCRITORIO ============ */
        #escritorio {
            background: linear-gradient(180deg, #ffaadd 0%, #ffe0f0 50%, #ffffff 100%);
            z-index: 70;
            flex-direction: column;
        }
        .area-escritorio {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .icono-escritorio {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            width: 90px;
            text-align: center;
            color: #000;
            font-size: 11px;
            transition: all 0.2s ease;
            z-index: 1;
        }
        .icono-escritorio:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 1px dotted var(--gray);
            transform: scale(1.05);
        }
        .icono-escritorio:active {
            transform: scale(0.95);
        }
        .icono-escritorio .img-icono {
            font-size: 40px;
            pointer-events: none;
        }

        /* Ventanas */
        .ventana {
            position: absolute;
            min-width: 350px;
            background: var(--silver);
            border: 2px solid;
            border-color: #fff var(--gray) var(--gray) #fff;
            box-shadow: 3px 3px 0 #000;
            z-index: 50;
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: auto;
            min-height: 250px;
            animation: abrirVentana 0.25s ease;
        }
        @keyframes abrirVentana {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .barra-titulo {
            background: linear-gradient(90deg, var(--win95-blue), #1084d0);
            color: white;
            padding: 5px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            cursor: move;
            height: 30px;
        }
        .cuerpo-ventana {
            flex: 1;
            padding: 20px;
            background: white;
            color: #000;
            font-size: 13px;
            overflow: auto;
        }

        /* Barra de tareas */
        .barra-tareas {
            height: 46px;
            background: var(--silver);
            border-top: 2px solid #fff;
            display: flex;
            align-items: center;
            padding: 4px 6px;
            gap: 8px;
            z-index: 200;
        }
        .btn-inicio {
            font-weight: bold;
            padding: 6px 16px;
            cursor: pointer;
            background: var(--silver);
            border: 2px solid;
            border-color: #fff var(--gray) var(--gray) #fff;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-inicio:hover {
            background: #fff;
        }
        .btn-inicio:active {
            border-color: var(--gray) #fff #fff var(--gray);
        }
        .hora-tarea {
            margin-left: auto;
            font-size: 12px;
            color: #000;
            padding: 6px 14px;
            border: 2px solid;
            border-color: var(--gray) #fff #fff var(--gray);
        }
        .menu-inicio {
            display: none;
            position: fixed;
            bottom: 50px;
            left: 6px;
            background: var(--silver);
            border: 2px solid;
            border-color: #fff var(--gray) var(--gray) #fff;
            z-index: 300;
            width: 220px;
            box-shadow: 2px 2px 0 black;
        }
        .menu-inicio.activo {
            display: block;
        }
        .item-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 13px;
            color: #000;
            transition: all 0.15s ease;
        }
        .item-menu:hover {
            background: var(--win95-blue);
            color: #fff;
        }

        /* Ajustes móvil */
        @media (max-width: 768px) {
            .icono-escritorio {
                width: 70px;
                padding: 6px;
            }
            .icono-escritorio .img-icono {
                font-size: 30px;
            }
            .ventana {
                min-width: 250px;
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>

    <div id="cursor-ojo">
        <svg viewBox="0 0 38 38">
            <ellipse cx="19" cy="19" rx="17" ry="12" fill="none" stroke="#d400ff" stroke-width="2.5"/>
            <circle cx="19" cy="19" r="7" fill="#d400ff" opacity="0.9"/>
            <circle cx="19" cy="19" r="3.5" fill="#fff"/>
            <path d="M2 19 L0 19 M36 19 L38 19 M19 2 L19 0 M19 36 L19 38" stroke="#d400ff" stroke-width="2.5"/>
        </svg>
    </div>

    <button class="sound-toggle" id="sound-toggle" onclick="alternarSonidoAmbiente()">🔊 SOUND ON</button>

    <div class="footer-vivo" id="footer-vivo">
        LAST SIGNAL: <span id="footer-signal">02:14 AM</span><br>
        NODE STATUS: <span style="color:#00ff41;">ACTIVE</span><br>
        MEMBERS ONLINE: <span id="footer-members">14</span><br>
        <span id="footer-alerta" style="display:none;" class="alerta">⚠ UNAUTHORIZED ACCESS</span>
    </div>

    <div class="pantalla activa" id="fase1-inicio">
        <div class="logo-inicio">M<span class="punto">.</span>Y<span class="punto">.</span><span style="color:#fff;">C</span></div>
        <div class="texto-iniciando">INICIANDO...</div>
    </div>

    <div class="pantalla" id="fase2-boot">
        <div class="capa-codigo" id="capa-codigo"></div>
        <div class="scanlines"></div>
        <div class="contenedor-boot" id="texto-boot"></div>
        <div class="mensaje-fantasma" style="top:10%;left:5%;">ACCESO_RESTRINGIDO</div>
        <div class="mensaje-fantasma" style="top:78%;right:5%;">DETROIT_VISION</div>
        <div class="mensaje-fantasma" style="top:45%;left:82%;">MALAGA_BASE</div>
    </div>

    <div class="pantalla" id="fase3-registro">
        <div class="formulario-acceso">
            <p style="font-size:28px;margin-bottom:30px;text-align:center;">> REQUEST ACCESS_</p>
            <label>> USERNAME:</label><input type="text" id="reg-usuario" placeholder="identify yourself">
            <label>> EMAIL:</label><input type="email" id="reg-email" placeholder="email@signal.net">
            <label>> PASSWORD:</label><input type="password" id="reg-contrasena" placeholder="········">
            <label>> ACCESS CODE:</label><input type="text" id="reg-codigo" value="23/10/2026" readonly style="opacity:0.6;">
            <div class="nivel-info" id="reg-nivel">CLEARANCE: DEFAULT</div>
            <button class="btn-acceso" onclick="procesarAcceso()">ENTER NETWORK</button>
        </div>
    </div>

    <div class="pantalla" id="escritorio">
        <div class="area-escritorio" id="area-escritorio"></div>
        <div class="menu-inicio" id="menu-inicio">
            <div class="item-menu" onclick="abrirVentana('myc');alternarInicio()">🎤 M.Y.C</div>
            <div class="item-menu" onclick="abrirVentana('vault');alternarInicio()">📁 /vault</div>
            <div class="item-menu" onclick="abrirVentana('transmissions');alternarInicio()">📡 /transmissions</div>
            <div class="item-menu" onclick="abrirVentana('store');alternarInicio()">💿 Store</div>
            <div class="item-menu" onclick="abrirVentana('tours');alternarInicio()">🌍 Tours</div>
            <div class="item-menu" onclick="abrirVentana('artists');alternarInicio()">🎨 Artists</div>
            <div style="border-top:1px solid #808080;margin:6px 0;"></div>
            <div class="item-menu" onclick="location.reload()">🚪 DISCONNECT</div>
        </div>
        <div class="barra-tareas">
            <button class="btn-inicio" onclick="alternarInicio()">🏠 Inicio</button>
            <button id="btn-reproducir" onclick="alternarReproduccion()" style="width:32px;height:32px;">▶</button>
            <span style="font-size:12px;color:#000;">SIGNAL FM</span>
            <div class="hora-tarea" id="hora-tarea">00:00</div>
        </div>
    </div>

    <script>
        // ============ TAB TITLE + FAVICON ============
        const tabTitle = document.getElementById('tab-title');
        const favicon = document.getElementById('favicon');
        let audioActivo = true;
        let nuevaTransmision = false;

        function actualizarTabAudio() {
            if (nuevaTransmision) {
                tabTitle.textContent = '🔴 NEW TRANSMISSION';
                favicon.href =
                    "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff0040'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff'/%3E%3C/svg%3E";
                setTimeout(() => { nuevaTransmision = false;
                    actualizarTabAudio(); }, 5000);
                return;
            }
            if (audioActivo) {
                tabTitle.textContent = '◉ M.Y.C TRANSMISSION';
                favicon.href =
                    "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d400ff'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff'/%3E%3C/svg%3E";
            } else {
                tabTitle.textContent = '◌ SIGNAL MUTED';
                favicon.href =
                    "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23444'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23999'/%3E%3C/svg%3E";
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                tabTitle.textContent = "DON'T LEAVE. SIGNAL LOST.";
            } else {
                actualizarTabAudio();
            }
        });

        // Simular nueva transmisión cada 30-60 segundos
        setInterval(() => {
            if (Math.random() > 0.6) {
                nuevaTransmision = true;
                actualizarTabAudio();
                mostrarMensajeTemporal('🔴 NEW TRANSMISSION INCOMING');
            }
        }, 30000 + Math.random() * 30000);

        // ============ CURSOR ============
        const cursorOjo = document.getElementById('cursor-ojo');
        let trailTimeout;

        function crearTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 500);
        }

        function moverCursor(e) {
            cursorOjo.style.left = (e.clientX - 20) + 'px';
            cursorOjo.style.top = (e.clientY - 20) + 'px';
            if (!trailTimeout) {
                trailTimeout = setTimeout(() => {
                    crearTrail(e.clientX, e.clientY);
                    trailTimeout = null;
                }, 50);
            }
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && (el.tagName === 'BUTTON' || el.tagName === 'A' || el.classList.contains('icono-escritorio') || el
                    .classList.contains('item-menu'))) {
                cursorOjo.classList.add('magnetic');
            } else {
                cursorOjo.classList.remove('magnetic');
            }
            if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
                cursorOjo.classList.add('sobre-input');
            } else {
                cursorOjo.classList.remove('sobre-input');
            }
        }
        document.addEventListener('mousemove', moverCursor);
        document.addEventListener('mousedown', () => cursorOjo.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursorOjo.classList.remove('clicking'));

        // ============ MENSAJES TEMPORALES (SCARCITY) ============
        function mostrarMensajeTemporal(texto) {
            const msg = document.createElement('div');
            msg.className = 'mensaje-temporal';
            msg.textContent = texto;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);
        }

        // Easter egg: escribir DETROIT en el campo de usuario
        document.getElementById('reg-usuario').addEventListener('input', function() {
            if (this.value.toUpperCase() === 'DETROIT') {
                mostrarMensajeTemporal('⚠ DETROIT VISION ACTIVE');
                document.body.classList.add('glitch-sistema');
                setTimeout(() => document.body.classList.remove('glitch-sistema'), 200);
            }
        });

        // ============ SONIDO ============
        let ctxAudio, ambienteNode, ambienteGain;

        function getCtx() { if (!ctxAudio) ctxAudio = new(window.AudioContext || window.webkitAudioContext)(); return ctxAudio; }

        function iniciarSonidoAmbiente() {
            if (!ambienteNode) {
                const ctx = getCtx();
                ambienteNode = ctx.createOscillator();
                ambienteGain = ctx.createGain();
                ambienteNode.type = 'sawtooth';
                ambienteNode.frequency.setValueAtTime(80, ctx.currentTime);
                ambienteGain.gain.setValueAtTime(0.015, ctx.currentTime);
                ambienteNode.connect(ambienteGain);
                ambienteGain.connect(ctx.destination);
                ambienteNode.start();
            }
        }

        function alternarSonidoAmbiente() {
            const btn = document.getElementById('sound-toggle');
            iniciarSonidoAmbiente();
            if (audioActivo) {
                ambienteGain.gain.setValueAtTime(0, getCtx().currentTime);
                btn.textContent = '🔇 SOUND OFF';
                btn.classList.add('muted');
                audioActivo = false;
            } else {
                ambienteGain.gain.setValueAtTime(0.015, getCtx().currentTime);
                btn.textContent = '🔊 SOUND ON';
                btn.classList.remove('muted');
                audioActivo = true;
            }
            actualizarTabAudio();
        }
        iniciarSonidoAmbiente();

        // Sonidos contextuales
        function playHoverSound() {
            try {
                const ctx = getCtx();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(1200, ctx.currentTime);
                g.gain.setValueAtTime(0.02, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                o.connect(g);
                g.connect(ctx.destination);
                o.start();
                o.stop(ctx.currentTime + 0.05);
            } catch (e) {}
        }

        function playClickSound() {
            try {
                const ctx = getCtx();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'square';
                o.frequency.setValueAtTime(800, ctx.currentTime);
                g.gain.setValueAtTime(0.04, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                o.connect(g);
                g.connect(ctx.destination);
                o.start();
                o.stop(ctx.currentTime + 0.08);
            } catch (e) {}
        }

        function playErrorSound() {
            try {
                const ctx = getCtx();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(150, ctx.currentTime);
                g.gain.setValueAtTime(0.06, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                o.connect(g);
                g.connect(ctx.destination);
                o.start();
                o.stop(ctx.currentTime + 0.3);
            } catch (e) {}
        }

        document.querySelectorAll('button, .icono-escritorio, .item-menu, input').forEach(el => {
            el.addEventListener('mouseenter', playHoverSound);
        });
        document.addEventListener('click', (e) => {
            if (e.target.closest('#reg-usuario') && document.getElementById('reg-usuario').value.toUpperCase() ===
                'DETROIT') {
                playErrorSound();
            } else {
                playClickSound();
            }
        });

        // ============ FOOTER VIVO ============
        function actualizarFooter() {
            const ahora = new Date();
            document.getElementById('footer-signal').textContent = ahora.toLocaleTimeString('es-ES', { hour: '2-digit',
                minute: '2-digit' });
            document.getElementById('footer-members').textContent = Math.floor(Math.random() * 20 + 5);
            // Simular alerta aleatoria
            if (Math.random() > 0.7) {
                const alerta = document.getElementById('footer-alerta');
                alerta.style.display = 'block';
                setTimeout(() => { alerta.style.display = 'none'; }, 3000);
            }
        }
        setInterval(actualizarFooter, 8000);
        actualizarFooter();

        // ============ IMPERFECCIÓN CONTROLADA (GLITCH ALEATORIO) ============
        function activarGlitchSistema() {
            document.body.classList.add('glitch-sistema');
            setTimeout(() => document.body.classList.remove('glitch-sistema'), 150);
        }
        setInterval(() => {
            if (Math.random() > 0.5) activarGlitchSistema();
        }, 12000 + Math.random() * 15000);

        // ============ INTRO ============
        const fragmentos = ['0x8F3A', 'DETROIT::VISION', 'MALAGA::BASE', '23/10/2026', 'MYC', 'CHAOS'];
        const capa = document.getElementById('capa-codigo');
        for (let i = 0; i < 20; i++) {
            const col = document.createElement('div');
            col.className = 'columna-codigo';
            col.style.left = Math.random() * 95 + '%';
            col.style.animationDuration = (10 + Math.random() * 25) + 's';
            col.style.animationDelay = Math.random() * 12 + 's';
            let t = '';
            for (let j = 0; j < 15; j++) t += fragmentos[Math.floor(Math.random() * fragmentos.length)] + '\n';
            col.textContent = t;
            capa.appendChild(col);
        }

        setTimeout(() => {
            const f1 = document.getElementById('fase1-inicio');
            f1.classList.add('modo-morado');
            setTimeout(() => {
                f1.classList.add('oculto');
                document.getElementById('fase2-boot').classList.add('activa');
                iniciarBoot();
            }, 800);
        }, 2000);

        const lineasBoot = [
            'M.Y.C SECURE SYSTEM v.2024',
            '──────────────────────────────────────────',
            'ESTABLISHING CONNECTION...',
            'SIGNAL FOUND: DETROIT RELAY',
            'AUTHENTICATING: MÁLAGA NODE',
            'ENCRYPTING CHANNEL... 256-BIT AES',
            'ACCESS GATEWAY: OPEN',
            '[████████████████████████████████] 100%',
            '',
            '> WELCOME. REQUEST ACCESS TO CONTINUE._'
        ];
        let iL = 0;

        function iniciarBoot() {
            if (iL < lineasBoot.length) {
                const l = document.createElement('div');
                l.className = 'linea-boot';
                l.textContent = lineasBoot[iL];
                document.getElementById('texto-boot').appendChild(l);
                iL++;
                setTimeout(iniciarBoot, 250 + Math.random() * 150);
            } else {
                setTimeout(() => {
                    document.getElementById('fase2-boot').classList.remove('activa');
                    document.getElementById('fase3-registro').classList.add('activa');
                }, 1000);
            }
        }

        function procesarAcceso() {
            const u = document.getElementById('reg-usuario').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-contrasena').value.trim();
            if (!u || !e || !p) { alert('> ERROR: All fields required.'); return; }
            let nivel = 'DEFAULT',
                desc = '';
            if (p === 'MYC-FOUNDER-2024') { nivel = 'FOUNDER';
                desc = '50% DISCOUNT'; } else if (document.getElementById('reg-codigo').value === '23/10/2026') { nivel = 'VIP';
                desc = '23% DISCOUNT'; }
            document.getElementById('reg-nivel').innerHTML =
                `CLEARANCE: ${nivel} <span style="color:#d400ff;">${desc}</span>`;
            document.getElementById('fase3-registro').classList.remove('activa');
            document.getElementById('escritorio').classList.add('activa');
            iniciarEscritorio(nivel);
        }

        // ============ ESCRITORIO ============
        let zIdx = 100,
            vId = 0;

        function iniciarEscritorio(nivel) {
            const area = document.getElementById('area-escritorio');
            area.innerHTML = '';
            const iconos = [
                { id: 'myc', i: '🎤', l: 'M.Y.C', t: 25, le: 25, delay: 0 },
                { id: 'vault', i: '📁', l: '/vault', t: 25, le: 135, delay: 0.2 },
                { id: 'transmissions', i: '📡', l: '/transmissions', t: 25, le: 245, delay: 0.4 },
                { id: 'store', i: '💿', l: 'Store', t: 140, le: 25, delay: 0.6 },
                { id: 'tours', i: '🌍', l: 'Tours', t: 140, le: 135, delay: 0.8 },
                { id: 'artists', i: '🎨', l: 'Artists', t: 140, le: 245, delay: 1 }
            ];
            iconos.forEach(ic => {
                const el = document.createElement('div');
                el.className = 'icono-escritorio reveal-delayed';
                el.style.top = ic.t + 'px';
                el.style.left = ic.le + 'px';
                el.style.animationDelay = ic.delay + 's';
                el.innerHTML = `<div class="img-icono">${ic.i}</div><span>${ic.l}</span>`;
                el.addEventListener('dblclick', () => abrirVentana(ic.id));
                el.addEventListener('mousedown', e => startDragIcon(e, el));
                area.appendChild(el);
            });
            setInterval(() => {
                document.getElementById('hora-tarea').textContent = new Date().toLocaleTimeString('es-ES', { hour: '2-digit',
                    minute: '2-digit' });
            }, 1000);
            iniciarAudioBeat();
        }

        let dIcon = null,
            dX = 0,
            dY = 0;

        function startDragIcon(e, el) { e.preventDefault();
            dIcon = el;
            dX = e.clientX - el.offsetLeft;
            dY = e.clientY - el.offsetTop; }
        document.addEventListener('mousemove', (e) => { if (dIcon) { dIcon.style.left = (e.clientX - dX) + 'px';
                dIcon.style.top = (e.clientY - dY) + 'px'; } });
        document.addEventListener('mouseup', () => { dIcon = null; });

        function abrirVentana(tipo) {
            const area = document.getElementById('area-escritorio');
            const win = document.createElement('div');
            win.className = 'ventana';
            win.id = 'v-' + (++vId);
            win.style.zIndex = ++zIdx;
            win.style.top = (60 + Math.random() * 100) + 'px';
            win.style.left = (60 + Math.random() * 200) + 'px';
            let tit = '',
                cont = '';
            switch (tipo) {
                case 'myc':
                    tit = 'M.Y.C';
                    cont = '<h3>M.Y.C</h3><p>Chaos With Purpose.</p>';
                    break;
                case 'vault':
                    tit = '/vault';
                    cont = '<h3>📁 CLASSIFIED</h3><p>0x8F3A_NEON_VOID.dat</p>';
                    break;
                case 'transmissions':
                    tit = '/transmissions';
                    cont = '<h3>📡 SIGNAL</h3><p>>> TOKYO NODE ACTIVE</p>';
                    break;
                case 'store':
                    tit = 'STORE';
                    cont = '<h3>💿 STORE</h3><p>Neon Void Vol.1</p>';
                    break;
                case 'tours':
                    tit = 'TOURS';
                    cont = '<h3>🌍 TOURS</h3><p>15 DIC Tokyo</p>';
                    break;
                case 'artists':
                    tit = 'ARTISTS';
                    cont = '<h3>🎨 ARTISTS</h3><p>VHS GLITCH</p>';
                    break;
                default:
                    tit = 'Window';
                    cont = '<p>Content</p>';
            }
            win.innerHTML =
                `<div class="barra-titulo" onmousedown="startDragWin(event,'${win.id}')"><span>${tit}</span><div><button onclick="document.getElementById('${win.id}').remove()">✕</button></div></div><div class="cuerpo-ventana">${cont}</div>`;
            area.appendChild(win);
        }

        let dWin = null,
            wX = 0,
            wY = 0;

        function startDragWin(e, id) { e.preventDefault();
            dWin = document.getElementById(id);
            wX = e.clientX - dWin.offsetLeft;
            wY = e.clientY - dWin.offsetTop;
            dWin.style.zIndex = ++zIdx; }
        document.addEventListener('mousemove', (e) => { if (dWin) { dWin.style.left = (e.clientX - wX) + 'px';
                dWin.style.top = (e.clientY - wY) + 'px'; } });
        document.addEventListener('mouseup', () => { dWin = null; });

        function alternarInicio() { document.getElementById('menu-inicio').classList.toggle('activo'); }
        document.addEventListener('click', (e) => { const m = document.getElementById('menu-inicio'); const b = document
                .querySelector('.btn-inicio'); if (m && !m.contains(e.target) && e.target !== b) m.classList.remove(
                    'activo'); });

        let ctxBeat, playing = false,
            oscBeat, gainBeat;

        function iniciarAudioBeat() { if (!ctxBeat) { ctxBeat = new(window.AudioContext || window.webkitAudioContext)();
                oscBeat = ctxBeat.createOscillator();
                gainBeat = ctxBeat.createGain();
                oscBeat.type = 'sawtooth';
                oscBeat.frequency.setValueAtTime(110, ctxBeat.currentTime);
                gainBeat.gain.setValueAtTime(0, ctxBeat.currentTime);
                oscBeat.connect(gainBeat);
                gainBeat.connect(ctxBeat.destination);
                oscBeat.start(); } }

        function alternarReproduccion() { const btn = document.getElementById('btn-reproducir');
            iniciarAudioBeat(); if (ctxBeat.state === 'suspended') ctxBeat.resume(); if (playing) { gainBeat.gain
                    .setValueAtTime(0, ctxBeat.currentTime);
                btn.textContent = '▶';
                playing = false; } else { gainBeat.gain.setValueAtTime(0.12, ctxBeat.currentTime);
                btn.textContent = '⏸';
                playing = true; } }
    </script>
</body>
</html>
