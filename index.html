<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="tab-title">◉ M.Y.C TRANSMISSION</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d400ff'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff'/%3E%3C/svg%3E" id="favicon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --black: #010508;
            --deep-black: #000000;
            --magenta: #d400ff;
            --magenta-glow: rgba(212, 0, 255, 0.8);
            --cyan: #00b8b8;
            --green-terminal: #00ff41;
            --white: #f0f0f0;
            --gray: #808080;
            --silver: #c0c0c0;
            --win95-blue: #000080;
            --bg-rosa: #ffaadd;
            --danger: #ff0040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: var(--deep-black);
            height: 100vh;
            overflow: hidden;
            color: var(--white);
            user-select: none;
            cursor: none;
        }

        /* CURSOR OJO + TRAIL + MAGNETIC */
        #cursor-ojo {
            position: fixed;
            width: 36px;
            height: 36px;
            z-index: 99999;
            pointer-events: none;
            transition: transform 0.06s ease, filter 0.2s ease, width 0.2s, height 0.2s;
            filter: drop-shadow(0 0 18px var(--magenta-glow));
            top: 50%;
            left: 50%;
            opacity: 1;
        }
        #cursor-ojo.magnetic {
            width: 44px;
            height: 44px;
            filter: drop-shadow(0 0 30px #ff00ff);
        }
        #cursor-ojo.clicking {
            transform: scale(0.65);
        }
        #cursor-ojo.sobre-input {
            filter: drop-shadow(0 0 25px #ff00ff);
        }
        #cursor-ojo svg {
            width: 100%;
            height: 100%;
        }
        @media (max-width: 768px) {
            #cursor-ojo {
                display: none;
            }
            body {
                cursor: auto;
            }
        }

        .cursor-trail {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--magenta);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            opacity: 0.5;
            animation: fadeTrail 0.4s ease-out forwards;
        }
        @keyframes fadeTrail {
            to {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* GLITCH */
        @keyframes glitchSystem {
            0%,
            100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(3px);
                filter: hue-rotate(90deg);
            }
        }
        .glitch-sistema {
            animation: glitchSystem 0.15s ease;
        }

        /* MENSAJES TEMPORALES */
        .mensaje-temporal {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px 25px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 3px;
            z-index: 500;
            animation: aparecerDesaparecer 4s ease forwards;
            pointer-events: none;
        }
        @keyframes aparecerDesaparecer {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            85% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        /* MOMENTO WOW */
        .pantalla-wow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(24px, 5vw, 40px);
            color: var(--magenta);
            letter-spacing: 10px;
            animation: wowEntrada 2s ease forwards;
        }
        @keyframes wowEntrada {
            0% {
                opacity: 0;
                transform: scale(2);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(1);
            }
        }

        /* BOTÓN SONIDO */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 10px 18px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .sound-toggle:hover {
            background: var(--magenta);
            color: #000;
        }
        .sound-toggle.muted {
            border-color: #444;
            color: #444;
        }

        /* FOOTER VIVO */
        .footer-vivo {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: #333;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .footer-vivo span {
            color: var(--magenta);
        }
        .footer-vivo .alerta {
            color: var(--danger);
            animation: glitchSystem 0.3s ease;
        }

        /* PARTÍCULAS */
        .particula {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--magenta);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
            animation: flotarParticula 4s ease-in-out infinite;
        }
        @keyframes flotarParticula {
            0%,
            100% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-20px) translateX(10px);
            }
        }

        /* PANTALLAS */
        .pantalla {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .pantalla.activa {
            display: flex;
        }

        /* Fase 1 */
        #fase1-inicio {
            background: #000;
            z-index: 100;
            transition: opacity 0.8s ease, background 1s ease;
        }
        #fase1-inicio.modo-morado {
            background: radial-gradient(circle at center, #1a0030, #000);
        }
        #fase1-inicio.oculto {
            opacity: 0;
            pointer-events: none;
        }
        .logo-inicio {
            font-size: clamp(60px, 10vw, 100px);
            font-weight: 900;
            letter-spacing: 20px;
            color: #fff;
            text-shadow: 0 0 80px var(--magenta-glow);
            animation: aparecerLogo 1s ease-out forwards;
        }
        @keyframes aparecerLogo {
            0% {
                opacity: 0;
                transform: scale(1.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .logo-inicio .punto {
            color: var(--magenta);
        }
        .texto-iniciando {
            margin-top: 35px;
            font-size: clamp(18px, 3vw, 24px);
            color: #aaa;
            letter-spacing: 12px;
            opacity: 0;
            animation: mostrarTexto 0.8s 0.8s forwards, pulsoTexto 2.5s 1.5s infinite;
        }
        @keyframes mostrarTexto {
            to {
                opacity: 1;
            }
        }
        @keyframes pulsoTexto {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        /* Fase 2 */
        #fase2-boot {
            background: radial-gradient(ellipse at center, #1c0035 0%, #010508 100%);
            z-index: 90;
            color: var(--green-terminal);
        }
        .capa-codigo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .columna-codigo {
            position: absolute;
            top: -100px;
            font-size: 12px;
            color: var(--cyan);
            opacity: 0.2;
            animation: caerCodigo linear infinite;
            white-space: pre;
            line-height: 1.4;
        }
        @keyframes caerCodigo {
            0% {
                transform: translateY(-100px);
            }
            100% {
                transform: translateY(110vh);
            }
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 3px);
            pointer-events: none;
            z-index: 1;
        }
        .contenedor-boot {
            max-width: 900px;
            width: 90%;
            padding: 50px;
            border-left: 3px solid rgba(0, 255, 65, 0.4);
            position: relative;
            z-index: 3;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }
        .linea-boot {
            opacity: 0;
            font-size: 18px;
            margin: 8px 0;
            animation: escribirLinea 0.3s forwards;
        }
        @keyframes escribirLinea {
            to {
                opacity: 1;
            }
        }
        .mensaje-fantasma {
            position: fixed;
            font-size: 14px;
            color: var(--cyan);
            opacity: 0;
            z-index: 95;
            pointer-events: none;
        }

        /* Fase 3 */
        #fase3-registro {
            background: #000;
            z-index: 80;
            color: var(--green-terminal);
        }
        .formulario-acceso {
            border: 2px solid var(--green-terminal);
            padding: clamp(30px, 5vw, 60px);
            max-width: 550px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }
        .formulario-acceso input {
            background: #000;
            border: none;
            border-bottom: 2px solid var(--green-terminal);
            color: var(--green-terminal);
            font-family: inherit;
            font-size: 20px;
            padding: 14px 0;
            width: 100%;
            outline: none;
            caret-color: #ff00ff;
        }
        .btn-acceso {
            background: var(--green-terminal);
            color: #000;
            border: none;
            padding: 16px 50px;
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            margin-top: 35px;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            width: 100%;
            cursor: pointer;
        }
        .btn-acceso:hover {
            background: #fff;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.7);
            transform: scale(1.02);
        }
        .btn-acceso:active {
            transform: scale(0.98);
        }
        .nivel-info {
            margin-top: 25px;
            font-size: 18px;
            text-align: center;
        }

        /* ESCRITORIO */
        #escritorio {
            background: linear-gradient(180deg, #ffaadd 0%, #ffe0f0 50%, #ffffff 100%);
            z-index: 70;
            flex-direction: column;
        }
        .area-escritorio {
            flex: 1;
            position: relative;
            overflow: hidden;
            padding: 15px;
        }
        .icono-escritorio {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            width: 80px;
            text-align: center;
            color: #000;
            font-size: 10px;
            transition: all 0.2s ease;
            z-index: 1;
        }
        .icono-escritorio:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 1px dotted var(--gray);
            transform: scale(1.05);
        }
        .icono-escritorio:active {
            transform: scale(0.95);
        }
        .icono-escritorio .img-icono {
            font-size: 36px;
            pointer-events: none;
        }

        /* VENTANAS CON SCROLL */
        .ventana {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 46px);
            background: #fff;
            z-index: 50;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .ventana.abierta {
            transform: translateY(0);
        }
        .barra-titulo-ventana {
            background: linear-gradient(90deg, var(--win95-blue), #1084d0);
            color: white;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            height: 42px;
            flex-shrink: 0;
        }
        .btn-cierre {
            background: var(--silver);
            border: 2px solid;
            border-color: #fff var(--gray) var(--gray) #fff;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }
        .cuerpo-ventana {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            color: #000;
            font-size: 13px;
            line-height: 1.6;
        }
        .cuerpo-ventana h3 {
            color: var(--win95-blue);
            margin-bottom: 15px;
            font-size: 18px;
        }

        /* BARRA DE TAREAS */
        .barra-tareas {
            height: 46px;
            background: var(--silver);
            border-top: 2px solid #fff;
            display: flex;
            align-items: center;
            padding: 3px 5px;
            gap: 6px;
            z-index: 200;
            flex-shrink: 0;
        }
        .btn-inicio {
            font-weight: bold;
            padding: 5px 14px;
            cursor: pointer;
            background: var(--silver);
            border: 2px solid;
            border-color: #fff var(--gray) var(--gray) #fff;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        .btn-inicio:hover {
            background: #fff;
        }
        .hora-tarea {
            margin-left: auto;
            font-size: 11px;
            color: #000;
        }

        /* MENÚ INICIO */
        .menu-inicio {
            display: none;
            position: fixed;
            bottom: 50px;
            left: 6px;
            background: var(--silver);
            border: 2px solid;
            border-color: #fff var(--gray) var(--gray) #fff;
            z-index: 300;
            width: 220px;
            box-shadow: 2px 2px 0 black;
        }
        .menu-inicio.activo {
            display: block;
        }
        .item-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 13px;
            color: #000;
            transition: all 0.15s ease;
        }
        .item-menu:hover {
            background: var(--win95-blue);
            color: #fff;
        }

        @media (max-width: 768px) {
            .icono-escritorio {
                width: 70px;
                padding: 6px;
            }
            .icono-escritorio .img-icono {
                font-size: 28px;
            }
            .cuerpo-ventana {
                padding: 15px;
                font-size: 12px;
            }
            .barra-titulo-ventana {
                font-size: 12px;
                height: 38px;
            }
        }
    </style>
</head>
<body>

    <div id="cursor-ojo">
        <svg viewBox="0 0 32 32">
            <ellipse cx="16" cy="16" rx="14" ry="10" fill="none" stroke="#d400ff" stroke-width="2"/>
            <circle cx="16" cy="16" r="5" fill="#d400ff" opacity="0.9"/>
            <circle cx="16" cy="16" r="2.5" fill="#fff"/>
            <path d="M2 16 L0 16 M30 16 L32 16 M16 2 L16 0 M16 30 L16 32" stroke="#d400ff" stroke-width="1.5"/>
        </svg>
    </div>

    <button class="sound-toggle" id="sound-toggle" onclick="alternarSonido()">🔊 SOUND ON</button>

    <div class="footer-vivo" id="footer-vivo">
        LAST SIGNAL: <span id="footer-signal">02:14 AM</span><br>
        NODE STATUS: <span style="color:#00ff41;">ACTIVE</span><br>
        SIGNALS TODAY: <span id="footer-signals">3</span><br>
        USERS ACTIVE: <span id="footer-members">14</span><br>
        <span id="footer-alerta" style="display:none;" class="alerta">⚠ UNAUTHORIZED ACCESS</span>
    </div>

    <!-- FASE 1 -->
    <div class="pantalla activa" id="fase1-inicio">
        <div class="logo-inicio">M<span class="punto">.</span>Y<span class="punto">.</span><span style="color:#fff;">C</span></div>
        <div class="texto-iniciando" id="texto-iniciando">INICIANDO...</div>
    </div>

    <!-- FASE 2 -->
    <div class="pantalla" id="fase2-boot">
        <div class="capa-codigo" id="capa-codigo"></div>
        <div class="scanlines"></div>
        <div class="contenedor-boot" id="texto-boot"></div>
        <div class="mensaje-fantasma" style="top:10%;left:5%;">ACCESO_RESTRINGIDO</div>
        <div class="mensaje-fantasma" style="top:78%;right:5%;">DETROIT_VISION</div>
        <div class="mensaje-fantasma" style="top:45%;left:82%;">MALAGA_BASE</div>
    </div>

    <!-- FASE 3 -->
    <div class="pantalla" id="fase3-registro">
        <div class="formulario-acceso">
            <p style="font-size:28px;margin-bottom:30px;text-align:center;">> REQUEST ACCESS_</p>
            <label>> USERNAME:</label><input type="text" id="reg-usuario" placeholder="identify yourself">
            <label>> EMAIL:</label><input type="email" id="reg-email" placeholder="email@signal.net">
            <label>> PASSWORD:</label><input type="password" id="reg-contrasena" placeholder="········">
            <label>> ACCESS CODE:</label><input type="text" id="reg-codigo" value="23/10/2026" readonly style="opacity:0.6;">
            <div class="nivel-info" id="reg-nivel">CLEARANCE: DEFAULT</div>
            <button class="btn-acceso" onclick="procesarAcceso()">ENTER NETWORK</button>
        </div>
    </div>

    <!-- ESCRITORIO -->
    <div class="pantalla" id="escritorio">
        <div class="area-escritorio" id="area-escritorio"></div>
        <div class="menu-inicio" id="menu-inicio">
            <div class="item-menu" onclick="abrirVentana('myc');toggleMenu()">🎤 M.Y.C</div>
            <div class="item-menu" onclick="abrirVentana('babybuus');toggleMenu()">👶 Baby Buu's</div>
            <div class="item-menu" onclick="abrirVentana('store');toggleMenu()">💿 Store</div>
            <div class="item-menu" onclick="abrirVentana('merch');toggleMenu()">👕 Merch</div>
            <div class="item-menu" onclick="abrirVentana('tours');toggleMenu()">🌍 Tours</div>
            <div class="item-menu" onclick="abrirVentana('artists');toggleMenu()">🎨 Artists</div>
            <div style="border-top:1px solid #808080;margin:6px 0;"></div>
            <div class="item-menu" onclick="location.reload()">🚪 DISCONNECT</div>
        </div>
        <div class="barra-tareas">
            <button class="btn-inicio" onclick="toggleMenu()">🏠 Inicio</button>
            <button id="btn-reproducir" onclick="alternarReproduccion()" style="width:28px;height:28px;font-weight:bold;">▶</button>
            <span style="font-size:11px;color:#000;">SIGNAL FM</span>
            <div class="hora-tarea" id="hora-tarea">00:00</div>
        </div>
    </div>

    <script>
        // ========== MEMORIA ==========
        const memoria = JSON.parse(localStorage.getItem('myc_memoria') || '{}');
        if (!memoria.primeraVisita) { memoria.primeraVisita = Date.now();
            memoria.senalesRecibidas = 0;
            memoria.visitas = 1; } else { memoria.visitas = (memoria.visitas || 1) + 1; }
        memoria.ultimaVisita = Date.now();
        localStorage.setItem('myc_memoria', JSON.stringify(memoria));

        // ========== TAB TITLE + FAVICON ==========
        const tabTitle = document.getElementById('tab-title');
        const favicon = document.getElementById('favicon');
        let audioActivo = memoria.audioActivado !== undefined ? memoria.audioActivado : true;
        let nuevaTransmision = false;

        function actualizarTabAudio() {
            if (nuevaTransmision) {
                tabTitle.textContent = '🔴 NEW TRANSMISSION';
                favicon.href =
                    "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff0040'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff'/%3E%3C/svg%3E";
                setTimeout(() => { nuevaTransmision = false;
                    actualizarTabAudio(); }, 5000);
                return;
            }
            if (audioActivo) {
                tabTitle.textContent = '◉ M.Y.C TRANSMISSION';
                favicon.href =
                    "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d400ff'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff'/%3E%3C/svg%3E";
            } else {
                tabTitle.textContent = '◌ SIGNAL MUTED';
                favicon.href =
                    "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23444'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23999'/%3E%3C/svg%3E";
            }
        }
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) tabTitle.textContent = "DON'T LEAVE. SIGNAL LOST.";
            else actualizarTabAudio();
        });
        setInterval(() => { if (Math.random() > 0.6) { nuevaTransmision = true;
                actualizarTabAudio();
                mostrarMensajeTemporal('🔴 NEW TRANSMISSION INCOMING'); } }, 30000 + Math.random() * 30000);

        // ========== RITUAL ==========
        if (memoria.visitas > 1) document.getElementById('texto-iniciando').textContent = 'WELCOME BACK.';

        // ========== CURSOR ==========
        const cursorOjo = document.getElementById('cursor-ojo');
        let trailTimeout;

        function crearTrail(x, y) { const t = document.createElement('div');
            t.className = 'cursor-trail';
            t.style.left = x + 'px';
            t.style.top = y + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 400); }

        function moverCursor(e) {
            cursorOjo.style.left = (e.clientX - 18) + 'px';
            cursorOjo.style.top = (e.clientY - 18) + 'px';
            if (!trailTimeout) { trailTimeout = setTimeout(() => { crearTrail(e.clientX, e.clientY);
                    trailTimeout = null; }, 50); }
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && (el.tagName === 'BUTTON' || el.tagName === 'A' || el.classList.contains('icono-escritorio') || el
                    .classList.contains('item-menu'))) cursorOjo.classList.add('magnetic');
            else cursorOjo.classList.remove('magnetic');
            if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) cursorOjo.classList.add('sobre-input');
            else cursorOjo.classList.remove('sobre-input');
        }
        document.addEventListener('mousemove', moverCursor);
        document.addEventListener('mousedown', () => cursorOjo.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursorOjo.classList.remove('clicking'));

        // ========== MENSAJES ==========
        function mostrarMensajeTemporal(texto) { const m = document.createElement('div');
            m.className = 'mensaje-temporal';
            m.textContent = texto;
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 4000); }

        // ========== SONIDOS ==========
        let ctxAudio;

        function getCtx() { if (!ctxAudio) ctxAudio = new(window.AudioContext || window.webkitAudioContext)(); return ctxAudio; }

        function playHoverSound() { try { const c = getCtx(); const o = c.createOscillator(); const g = c.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(1200, c.currentTime);
                g.gain.setValueAtTime(0.015, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.04);
                o.connect(g);
                g.connect(c.destination);
                o.start();
                o.stop(c.currentTime + 0.04); } catch (e) {} }

        function playClickSound() { try { const c = getCtx(); const o = c.createOscillator(); const g = c.createGain();
                o.type = 'square';
                o.frequency.setValueAtTime(800, c.currentTime);
                g.gain.setValueAtTime(0.03, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
                o.connect(g);
                g.connect(c.destination);
                o.start();
                o.stop(c.currentTime + 0.06); } catch (e) {} }

        function playKeySound() { try { const c = getCtx(); const o = c.createOscillator(); const g = c.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(600 + Math.random() * 200, c.currentTime);
                g.gain.setValueAtTime(0.01, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.03);
                o.connect(g);
                g.connect(c.destination);
                o.start();
                o.stop(c.currentTime + 0.03); } catch (e) {} }

        function playErrorSound() { try { const c = getCtx(); const o = c.createOscillator(); const g = c.createGain();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(150, c.currentTime);
                g.gain.setValueAtTime(0.05, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.25);
                o.connect(g);
                g.connect(c.destination);
                o.start();
                o.stop(c.currentTime + 0.25); } catch (e) {} }

        function playUnlockSound() { try { const c = getCtx(); const o = c.createOscillator(); const g = c.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(1000, c.currentTime);
                o.frequency.linearRampToValueAtTime(2000, c.currentTime + 0.3);
                g.gain.setValueAtTime(0.08, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.4);
                o.connect(g);
                g.connect(c.destination);
                o.start();
                o.stop(c.currentTime + 0.4); } catch (e) {} }

        document.addEventListener('keydown', (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')
                playKeySound(); });
        document.querySelectorAll('button, .icono-escritorio, .btn-acceso, .btn-inicio, .item-menu').forEach(el => { el
                .addEventListener('mouseenter', playHoverSound); });
        document.addEventListener('click', playClickSound);

        // Easter eggs
        document.getElementById('reg-usuario').addEventListener('input', function() { if (this.value.toUpperCase() ===
                'DETROIT') { mostrarMensajeTemporal('⚠ DETROIT VISION ACTIVE');
                document.body.classList.add('glitch-sistema');
                setTimeout(() => document.body.classList.remove('glitch-sistema'), 200);
                playErrorSound(); } });
        document.getElementById('reg-contrasena').addEventListener('input', function() { if (this.value.toUpperCase() ===
                'ARCHIVE') { mostrarMensajeTemporal('📁 ARCHIVE ACCESS UNLOCKED');
                memoria.archiveDesbloqueado = true;
                localStorage.setItem('myc_memoria', JSON.stringify(memoria));
                playUnlockSound(); } });

        // ========== SONIDO ==========
        function alternarSonido() { const btn = document.getElementById('sound-toggle'); if (audioActivo) { btn.textContent =
                    '🔇 SOUND OFF';
                btn.classList.add('muted');
                audioActivo = false; } else { btn.textContent = '🔊 SOUND ON';
                btn.classList.remove('muted');
                audioActivo = true; }
            memoria.audioActivado = audioActivo;
            localStorage.setItem('myc_memoria', JSON.stringify(memoria));
            actualizarTabAudio(); }
        if (!audioActivo) { document.getElementById('sound-toggle').textContent = '🔇 SOUND OFF';
            document.getElementById('sound-toggle').classList.add('muted'); }

        // ========== FOOTER ==========
        function actualizarFooter() { document.getElementById('footer-signal').textContent = new Date()
                .toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('footer-members').textContent = Math.floor(Math.random() * 20 + 5);
            document.getElementById('footer-signals').textContent = Math.floor(Math.random() * 8 + 1); if (Math.random() >
                0.7) { const a = document.getElementById('footer-alerta');
                a.style.display = 'block';
                setTimeout(() => a.style.display = 'none', 3000); } }
        setInterval(actualizarFooter, 8000);
        actualizarFooter();

        // ========== GLITCH ==========
        function activarGlitchSistema() { document.body.classList.add('glitch-sistema');
            setTimeout(() => document.body.classList.remove('glitch-sistema'), 150); }
        setInterval(() => { if (Math.random() > 0.5) activarGlitchSistema(); }, 12000 + Math.random() * 15000);

        // ========== PARTÍCULAS ==========
        for (let i = 0; i < 10; i++) { const p = document.createElement('div');
            p.className = 'particula';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 4 + 's';
            p.style.animationDuration = (3 + Math.random() * 4) + 's';
            document.body.appendChild(p); }

        // ========== INTRO ==========
        const fragmentos = ['0x8F3A', 'DETROIT::VISION', 'MALAGA::BASE', '23/10/2026', 'MYC', 'CHAOS'];
        const capa = document.getElementById('capa-codigo');
        for (let i = 0; i < 20; i++) { const col = document.createElement('div');
            col.className = 'columna-codigo';
            col.style.left = Math.random() * 95 + '%';
            col.style.animationDuration = (10 + Math.random() * 25) + 's';
            col.style.animationDelay = Math.random() * 12 + 's';
            let t = '';
            for (let j = 0; j < 15; j++) t += fragmentos[Math.floor(Math.random() * fragmentos.length)] + '\n';
            col.textContent = t;
            capa.appendChild(col); }

        setTimeout(() => { const f1 = document.getElementById('fase1-inicio');
            f1.classList.add('modo-morado');
            setTimeout(() => { f1.classList.add('oculto');
                document.getElementById('fase2-boot').classList.add('activa');
                iniciarBoot(); }, 800); }, 2000);

        const lineasBoot = ['M.Y.C SECURE SYSTEM v.2024', '──────────────────────────────────────────',
            'ESTABLISHING CONNECTION...', 'SIGNAL FOUND: DETROIT RELAY', 'AUTHENTICATING: MÁLAGA NODE',
            'ENCRYPTING CHANNEL... 256-BIT AES', 'ACCESS GATEWAY: OPEN',
            '[████████████████████████████████] 100%', '', '> WELCOME. REQUEST ACCESS TO CONTINUE._'
        ];
        let iL = 0;

        function iniciarBoot() { if (iL < lineasBoot.length) { const l = document.createElement('div');
                l.className = 'linea-boot';
                l.textContent = lineasBoot[iL];
                document.getElementById('texto-boot').appendChild(l);
                iL++;
                setTimeout(iniciarBoot, 250 + Math.random() * 150); } else { setTimeout(() => { document.getElementById(
                        'fase2-boot').classList.remove('activa');
                    document.getElementById('fase3-registro').classList.add('activa'); }, 1000); } }

        // ========== MOMENTO WOW ==========
        function mostrarMomentoWow(nivel) { const wow = document.createElement('div');
            wow.className = 'pantalla-wow';
            wow.textContent = nivel === 'FOUNDER' ? '⬡ ACCESS GRANTED ⬡' : '⬡ WELCOME ⬡';
            document.body.appendChild(wow);
            setTimeout(() => wow.remove(), 2000); }

        function procesarAcceso() { const u = document.getElementById('reg-usuario').value.trim(); const e = document
                .getElementById('reg-email').value.trim(); const p = document.getElementById('reg-contrasena').value
                .trim(); if (!u || !e || !p) { alert('> ERROR: All fields required.'); return; } let nivel = 'DEFAULT',
                desc = ''; if (p === 'MYC-FOUNDER-2024') { nivel = 'FOUNDER';
                desc = '50% DISCOUNT'; } else if (document.getElementById('reg-codigo').value === '23/10/2026') { nivel = 'VIP';
                desc = '23% DISCOUNT'; }
            document.getElementById('reg-nivel').innerHTML =
                `CLEARANCE: ${nivel} <span style="color:#d400ff;">${desc}</span>`;
            document.getElementById('fase3-registro').classList.remove('activa');
            document.getElementById('escritorio').classList.add('activa');
            mostrarMomentoWow(nivel);
            iniciarEscritorio(nivel); }

        // ========== ESCRITORIO ==========
        function iniciarEscritorio(nivel) { const area = document.getElementById('area-escritorio');
            area.innerHTML = ''; const iconos = [{ id: 'myc', i: '🎤', l: 'M.Y.C', t: 15, le: 15 }, { id: 'babybuus',
                i: '👶', l: "Baby Buu's", t: 15, le: 115 }, { id: 'store', i: '💿', l: 'Store', t: 15, le: 215 },
            { id: 'merch', i: '👕', l: 'Merch', t: 120, le: 15 }, { id: 'tours', i: '🌍', l: 'Tours', t: 120, le: 115 },
            { id: 'artists', i: '🎨', l: 'Artists', t: 120, le: 215 } ];
            iconos.forEach(ic => { const el = document.createElement('div');
                el.className = 'icono-escritorio';
                el.style.top = ic.t + 'px';
                el.style.left = ic.le + 'px';
                el.innerHTML = `<div class="img-icono">${ic.i}</div><span>${ic.l}</span>`;
                el.addEventListener('click', () => abrirVentana(ic.id));
                el.addEventListener('mousedown', e => startDragIcon(e, el));
                area.appendChild(el); });
            setInterval(() => { document.getElementById('hora-tarea').textContent = new Date()
                    .toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }); }, 1000);
            initAudioBeat(); }
        let dIcon = null,
            dX = 0,
            dY = 0;

        function startDragIcon(e, el) { e.preventDefault();
            dIcon = el;
            dX = e.clientX - el.offsetLeft;
            dY = e.clientY - el.offsetTop; }
        document.addEventListener('mousemove', (e) => { if (dIcon) { dIcon.style.left = (e.clientX - dX) + 'px';
                dIcon.style.top = (e.clientY - dY) + 'px'; } });
        document.addEventListener('mouseup', () => { dIcon = null; });

        // ========== VENTANAS ==========
        const contenidos = {
            'myc': { title: 'M.Y.C — The Mayin Buu Club',
                body: '<h3>M.Y.C</h3><p>Chaos With Purpose.</p><p>Diseñado en Málaga. Visión Detroit. Proyección Mundial.</p>' },
            'babybuus': { title: "Baby Buu's — Subsello Oficial",
                body: "<h3>Baby Buu's</h3><p>Subsello experimental de M.Y.C.</p>" },
            'store': { title: 'Store — Discos',
                body: '<h3>💿 Store</h3><p>Neon Void Vol.1 — 24.99€</p><p>First Steps EP — 12.99€</p>' },
            'merch': { title: 'Merch — Ropa',
            body: "<h3>👕 Merch</h3><p>Camiseta M.Y.C — 29.99€</p><p>Gorra Baby Buu's — 22.00€</p>" },
            'tours': { title: 'Tours — Fechas',
                body: '<h3>🌍 Tours</h3><p>15 DIC — Tokyo</p><p>20 ENE — Berlin</p><p>14 FEB — Miami</p>' },
            'artists': { title: 'Artists — Roster',
                body: '<h3>🎨 Artists</h3><p>VHS GLITCH — Synthwave</p><p>TERMINAL X — Cyberpunk</p>' }
        };

        function abrirVentana(id) { const existente = document.querySelector('.ventana'); if (existente) existente
            .remove(); const data = contenidos[id] || { title: 'Ventana', body: '<p>Contenido no disponible.</p>' };
            const win = document.createElement('div');
            win.className = 'ventana';
            win.innerHTML =
                `<div class="barra-titulo-ventana"><span>${data.title}</span><button class="btn-cierre" onclick="cerrarVentana()">✕</button></div><div class="cuerpo-ventana">${data.body}</div>`;
            document.getElementById('escritorio').appendChild(win);
            requestAnimationFrame(() => { win.classList.add('abierta'); }); }

        function cerrarVentana() { const win = document.querySelector('.ventana'); if (win) { win.classList.remove(
                'abierta');
                setTimeout(() => win.remove(), 300); } }

        function toggleMenu() { document.getElementById('menu-inicio').classList.toggle('activo'); }
        document.addEventListener('click', (e) => { const m = document.getElementById('menu-inicio'); const b = document
                .querySelector('.btn-inicio'); if (m && !m.contains(e.target) && e.target !== b && !b.contains(e.target))
                m.classList.remove('activo'); });

        // ========== REPRODUCTOR ==========
        let ctxBeat, playing = false,
            oscBeat, gainBeat;

        function initAudioBeat() { if (!ctxBeat) { ctxBeat = new(window.AudioContext || window.webkitAudioContext)();
                oscBeat = ctxBeat.createOscillator();
                gainBeat = ctxBeat.createGain();
                oscBeat.type = 'sawtooth';
                oscBeat.frequency.setValueAtTime(110, ctxBeat.currentTime);
                gainBeat.gain.setValueAtTime(0, ctxBeat.currentTime);
                oscBeat.connect(gainBeat);
                gainBeat.connect(ctxBeat.destination);
                oscBeat.start(); } }

        function alternarReproduccion() { const btn = document.getElementById('btn-reproducir');
            initAudioBeat(); if (ctxBeat.state === 'suspended') ctxBeat.resume(); if (playing) { gainBeat.gain
                    .setValueAtTime(0, ctxBeat.currentTime);
                btn.textContent = '▶';
                playing = false; } else { gainBeat.gain.setValueAtTime(0.12, ctxBeat.currentTime);
                btn.textContent = '⏸';
                playing = true; } }
    </script>
</body>
</html>
